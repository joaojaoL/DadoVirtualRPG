<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG MASTER - TACTICAL SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --red: #d90429; --dark: #0b090a; --card: #161a1d; --white: #f5f3f4; --border: #444; }
        * { border-radius: 0 !important; box-sizing: border-box; }
        body { font-family: 'Roboto Mono', monospace; background: var(--dark); color: var(--white); margin: 0; padding-bottom: 50px; }
        .header { background: var(--red); padding: 15px; text-align: center; border-bottom: 5px solid #000; margin-bottom: 20px; }
        .header h1 { margin: 0; font-family: 'Oswald'; text-transform: uppercase; font-size: 1.5rem; }
        .container { max-width: 800px; width: 95%; background: var(--card); padding: 25px; border: 3px solid var(--red); margin: 20px auto; box-shadow: 10px 10px 0px #000; }
        h2, h3 { font-family: 'Oswald'; text-transform: uppercase; border-bottom: 2px solid var(--red); padding-bottom: 5px; margin-bottom: 15px; }
        label { display: block; margin-top: 10px; font-weight: bold; color: var(--red); font-size: 0.8rem; }
        select, input, textarea { padding: 10px; margin: 5px 0; border: 2px solid var(--border); background: #000; color: #fff; width: 100%; font-family: 'Roboto Mono'; outline: none; }
        button { background: var(--red); color: white; border: none; padding: 12px; width: 100%; font-family: 'Oswald'; font-size: 1.1rem; text-transform: uppercase; cursor: pointer; margin-top: 10px; box-shadow: 4px 4px 0px #000; }
        button:hover { background: #ef233c; transform: translate(-1px, -1px); }
        .room-item { background: #000; border: 2px solid #333; padding: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        #rpg-panel { display: none; width: 98%; max-width: 1400px; margin: 0 auto; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 15px; }
        .card { background: var(--card); padding: 20px; border: 2px solid var(--red); }
        .hp-bar-bg { height: 25px; background: #222; border: 1px solid #000; margin: 8px 0; overflow: hidden; }
        .hp-bar-fill { height: 100%; background: var(--red); width: 100%; transition: 0.4s; }
        #chat-box { height: 350px; overflow-y: auto; background: #000; border: 1px solid #333; padding: 10px; font-size: 0.8rem; border-left: 4px solid var(--red); }
        .master-only { display: none; } /* Escondido por padrão */
    </style>
</head>
<body>

    <div class="header"><h1>RPG MASTER TACTICAL</h1></div>

    <div id="setup-choice" class="container">
        <h2>Escolha o Modo de Jogo</h2>
        <button onclick="showLobby()">MODO ONLINE (Firebase)</button>
        <button onclick="showCasual()" style="background:#2b2d42">MODO CASUAL (Offline)</button>
    </div>

    <div id="lobby" class="container" style="display:none">
        <h2>Salas Ativas</h2>
        <div id="room-list">Carregando salas...</div>
        <hr style="border:1px solid #333; margin:20px 0">
        <h2>Criar Sala</h2>
        <input type="text" id="new-room-name" placeholder="Nome da Sala">
        <select id="new-room-style"></select>
        <button onclick="criarSala()">Criar como Mestre</button>
    </div>

    <div id="casual-setup" class="container" style="display:none">
        <h2>Configuração Casual</h2>
        <label>TEMA</label>
        <select id="casual-style"></select>
        <label>JOGADORES</label>
        <input type="number" id="casual-p-count" value="2">
        <button onclick="setupCasualPlayers()">Configurar Fichas</button>
    </div>

    <div id="step-fichas" class="container" style="display:none">
        <h2 id="ficha-titulo">Fichas dos Personagens</h2>
        <div id="inputs-container"></div>
        <button onclick="finalizarSetup()">Iniciar Aventura</button>
    </div>

    <div id="rpg-panel">
        <div class="card">
            <h3>[STATUS DO GRUPO]</h3>
            <div id="final-hp-list"></div>
            <div class="master-only">
                <h3>[NOTAS DO MESTRE]</h3>
                <textarea id="master-notes" rows="10" placeholder="Segredos da história..."></textarea>
                <button onclick="salvarNotas()">Sincronizar Notas</button>
            </div>
        </div>

        <div class="card">
            <h3>[CHAT]</h3>
            <div id="chat-box"></div>
            <div style="display:flex; gap:5px; margin-top:5px">
                <input type="text" id="chat-input" placeholder="Sua fala...">
                <button onclick="enviarMsg()" style="width:70px; margin:0">OK</button>
            </div>
            
            <h3 style="margin-top:20px">[DADOS]</h3>
            <div class="master-only">
                <select id="dado-seletor">
                    <option value="4">D4</option><option value="6">D6</option><option value="20" selected>D20</option><option value="100">D100</option>
                </select>
                <div id="dice-result" style="font-size:3rem; text-align:center; font-family:'Oswald'; color:var(--red)">--</div>
                <button onclick="rolarDado()">Rolar (Mestre)</button>
            </div>
            <div id="player-dice-msg" style="text-align:center; color:#666; font-size:0.8rem">Apenas o mestre rola dados oficiais.</div>
        </div>
    </div>

    <script>
        // FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyA3-yiNczMAF4sdZ9kog4ovXc75fciaN2g",
            authDomain: "meudadovirtualok.firebaseapp.com",
            projectId: "meudadovirtualok",
            storageBucket: "meudadovirtualok.firebasestorage.app",
            messagingSenderId: "696487273882",
            appId: "1:696487273882:web:342934592e10b0c66d8623",
            databaseURL: "https://meudadovirtualok-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let isOnline = false, isMaster = false, currentRoom = "", myChar = "", currentStyle = "";

        const classesData = {
            jujutsu: ["Feiticeiro Grau 4", "Feiticeiro Grau 3", "Feiticeiro Grau 2", "Feiticeiro Grau 1", "Especial", "Shikigami", "Mestre de Ferramentas", "Receptáculo", "Restrição Celestial", "Usuário de Maldição", "Doutor Reverso", "Invocador", "Prodígio"],
            onepiece: ["Logia", "Paramecia", "Zoan", "3 Espadas", "Sniper", "Ciborgue", "Navegador", "Cozinheiro", "Arqueólogo", "Músico", "Timoneiro", "Haki Master", "Mink"],
            jojo: ["Stand Curto", "Stand Longo", "Stand Automático", "Stand Cura", "Stand Colônia", "Stand Independente", "Mestre Hamon", "Vampiro", "Spin User", "Ciborgue", "Stand Precisão", "Stand Força", "Lutador"],
            medieval: ["Guerreiro", "Mago", "Ladino", "Bárbaro", "Bardo", "Clérigo", "Druida", "Paladino", "Monge", "Feiticeiro", "Patrulheiro", "Necromante", "Alquimista"],
            slasher: ["Atleta", "Final Girl", "Nerd", "Popular", "Rebelde", "Xerife", "Sobrevivente", "Palhaço", "Monitor", "Estranho", "Médico", "Motorista", "Investigador"],
            roça: ["Vaqueiro", "Peão", "Benzedeira", "Fazendeiro", "Mateiro", "Violeiro", "Capataz", "Agrônomo", "Veterinário", "Pescador", "Lenhador", "Artesão", "Caminhoneiro"]
        };

        // Popular selects de tema
        const menus = ['new-room-style', 'casual-style'];
        menus.forEach(m => {
            const select = document.getElementById(m);
            for(let t in classesData) select.innerHTML += `<option value="${t}">${t.toUpperCase()}</option>`;
        });

        function showLobby() { isOnline = true; document.getElementById('setup-choice').style.display='none'; document.getElementById('lobby').style.display='block'; }
        function showCasual() { isOnline = false; isMaster = true; document.getElementById('setup-choice').style.display='none'; document.getElementById('casual-setup').style.display='block'; }

        // ONLINE LOGIC
        db.ref('rooms').on('value', snap => {
            const list = document.getElementById('room-list'); list.innerHTML = "";
            snap.forEach(c => {
                list.innerHTML += `<div class="room-item"><span>${c.key}</span> <button onclick="entrarSala('${c.key}')" style="width:80px; margin:0">ENTRAR</button></div>`;
            });
        });

        function criarSala() {
            currentRoom = document.getElementById('new-room-name').value;
            currentStyle = document.getElementById('new-room-style').value;
            if(!currentRoom) return;
            isMaster = true;
            db.ref('rooms/'+currentRoom).set({ style: currentStyle, master: true });
            abrirFichas(currentStyle, 1);
        }

        function entrarSala(name) {
            currentRoom = name;
            isMaster = false;
            db.ref('rooms/'+name+'/style').once('value', s => {
                currentStyle = s.val();
                abrirFichas(currentStyle, 1);
            });
        }

        // SETUP FICHAS
        function showFichas() {
            document.getElementById('lobby').style.display='none';
            document.getElementById('casual-setup').style.display='none';
            document.getElementById('step-fichas').style.display='block';
        }

        function abrirFichas(style, qtd) {
            showFichas();
            const container = document.getElementById('inputs-container');
            container.innerHTML = "";
            const classes = classesData[style];
            for(let i=0; i<qtd; i++) {
                let options = classes.map(c => `<option>${c}</option>`).join('');
                container.innerHTML += `
                    <div class="player-card-input">
                        <input type="text" class="in-nome" placeholder="Nome do Personagem">
                        <select class="in-classe">${options}</select>
                        <input type="number" class="in-hp" value="100">
                    </div>`;
            }
        }

        function setupCasualPlayers() {
            const qtd = document.getElementById('casual-p-count').value;
            currentStyle = document.getElementById('casual-style').value;
            abrirFichas(currentStyle, qtd);
        }

        function finalizarSetup() {
            const nomes = document.querySelectorAll('.in-nome');
            const cls = document.querySelectorAll('.in-classe');
            const hps = document.querySelectorAll('.in-hp');
            
            myChar = nomes[0].value || "Player";

            if(isOnline) {
                db.ref(`rooms/${currentRoom}/players/${myChar}`).set({
                    nome: myChar, classe: cls[0].value, hp: parseInt(hps[0].value), max: parseInt(hps[0].value)
                });
            } else {
                localPlayers = [];
                nomes.forEach((n, i) => localPlayers.push({nome: n.value, classe: cls[i].value, hp: parseInt(hps[i].value), max: parseInt(hps[i].value)}));
            }

            document.getElementById('step-fichas').style.display='none';
            document.getElementById('rpg-panel').style.display='grid';
            if(isMaster) {
                document.querySelectorAll('.master-only').forEach(e => e.style.display = 'block');
                document.getElementById('player-dice-msg').style.display = 'none';
            }
            iniciarPainel();
        }

        function iniciarPainel() {
            if(isOnline) {
                db.ref(`rooms/${currentRoom}/players`).on('value', snap => renderPlayers(snap));
                db.ref(`rooms/${currentRoom}/chat`).on('value', snap => {
                    const box = document.getElementById('chat-box'); box.innerHTML = "";
                    snap.forEach(c => box.innerHTML += `<div><b>${c.val().user}:</b> ${c.val().text}</div>`);
                    box.scrollTop = box.scrollHeight;
                });
                db.ref(`rooms/${currentRoom}/notes`).on('value', snap => { if(snap.val()) document.getElementById('master-notes').value = snap.val(); });
            } else {
                renderPlayersLocal();
            }
        }

        function renderPlayers(snap) {
            const list = document.getElementById('final-hp-list'); list.innerHTML = "";
            snap.forEach(child => {
                const p = child.val();
                const pct = (p.hp/p.max)*100;
                list.innerHTML += `
                    <div style="border:1px solid #444; padding:10px; margin-bottom:10px">
                        <b>${p.nome}</b> (${p.classe}) | ${p.hp}/${p.max}
                        <div class="hp-bar-bg"><div class="hp-bar-fill" style="width:${pct}%"></div></div>
                        ${isMaster ? `<button onclick="updateHPOnline('${p.nome}', -10)" style="width:48%; margin:0">-10</button> <button onclick="updateHPOnline('${p.nome}', 10)" style="width:48%; margin:0; background:#1b4332">+10</button>` : ''}
                    </div>`;
            });
        }

        function renderPlayersLocal() {
            const list = document.getElementById('final-hp-list'); list.innerHTML = "";
            localPlayers.forEach((p, i) => {
                const pct = (p.hp/p.max)*100;
                list.innerHTML += `<div style="border:1px solid #444; padding:10px; margin-bottom:10px">
                    <b>${p.nome}</b> | ${p.hp}/${p.max}
                    <div class="hp-bar-bg"><div class="hp-bar-fill" style="width:${pct}%"></div></div>
                    <button onclick="updateHPLocal(${i}, -10)" style="width:48%; margin:0">-10</button> <button onclick="updateHPLocal(${i}, 10)" style="width:48%; margin:0; background:#1b4332">+10</button>
                </div>`;
            });
        }

        function updateHPOnline(name, val) { db.ref(`rooms/${currentRoom}/players/${name}/hp`).transaction(c => Math.max(0, (c||0) + val)); }
        function updateHPLocal(i, val) { localPlayers[i].hp = Math.max(0, Math.min(localPlayers[i].max, localPlayers[i].hp + val)); renderPlayersLocal(); }
        
        function enviarMsg() {
            const t = document.getElementById('chat-input').value; if(!t) return;
            if(isOnline) db.ref(`rooms/${currentRoom}/chat`).push({user: myChar, text: t});
            else { document.getElementById('chat-box').innerHTML += `<div><b>${myChar}:</b> ${t}</div>`; }
            document.getElementById('chat-input').value = "";
        }

        function rolarDado() {
            const d = document.getElementById('dado-seletor').value;
            const res = Math.floor(Math.random() * d) + 1;
            document.getElementById('dice-result').innerText = res;
            if(isOnline) db.ref(`rooms/${currentRoom}/chat`).push({user: "SISTEMA", text: `Mestre rolou D${d}: [${res}]`});
        }

        function salvarNotas() { db.ref(`rooms/${currentRoom}/notes`).set(document.getElementById('master-notes').value); }
    </script>
</body>
</html>
