<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RPG Master - Ultra Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #d90429; --dark: #0b090a; --card: #161a1d; --white: #f5f3f4; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--white); margin: 0; padding-bottom: 50px; }
        
        .header { background: var(--red); width: 100%; padding: 15px; text-align: center; box-shadow: 0 4px 15px #000; position: sticky; top:0; z-index:100; }
        .header h1 { margin: 0; font-family: 'Oswald'; text-transform: uppercase; font-size: 1.2rem; }

        .container { width: 92%; max-width: 600px; background: var(--card); padding: 20px; border-radius: 12px; border-top: 5px solid var(--red); margin: 15px auto; box-shadow: 0 10px 30px #000; text-align: center; }
        
        input, select, button { padding: 15px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; font-size: 1rem; background: #0b090a; color: white; width: 100%; }
        button { background: var(--red); border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:active { transform: scale(0.95); background: #ef233c; }

        /* GRID DO PAINEL */
        #rpg-panel { display: none; width: 95%; max-width: 1100px; margin: 0 auto; gap: 15px; flex-direction: column; }
        @media (min-width: 800px) { #rpg-panel { display: none; flex-direction: row; align-items: flex-start; } }

        .card { background: var(--card); padding: 15px; border-radius: 10px; border: 1px solid #333; flex: 1; }

        /* BARRINHA PIXEL */
        .hp-unit { background: #111; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #222; }
        .hp-bar-wrapper { display: flex; align-items: center; gap: 8px; margin: 5px 0; }
        .hp-heart { width: 22px; height: 22px; image-rendering: pixelated; }
        .hp-bar-bg { flex-grow: 1; height: 16px; background: #444; border-radius: 2px; overflow: hidden; border: 1px solid #000; }
        .hp-bar-fill { height: 100%; background: #e63946; width: 100%; transition: 0.3s; }

        /* DADO */
        .dice-area { position: relative; width: 140px; height: 140px; margin: 10px auto; }
        .dice-img { width: 100%; height: 100%; object-fit: contain; }
        .dice-val { position: absolute; top: 52%; left: 50%; transform: translate(-50%, -50%); font-size: 2.5rem; font-family: 'MedievalSharp'; font-weight: bold; text-shadow: 2px 2px 4px #000; }

        /* ROLETA */
        .roulette-box { background: #000; padding: 20px; border-radius: 50%; width: 200px; height: 200px; margin: 20px auto; border: 4px solid var(--red); display: flex; align-items: center; justify-content: center; position: relative; transition: 3s cubic-bezier(0.1, 0, 0.1, 1); }
        .roulette-arrow { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid gold; z-index: 10; }
        
        #log { background: #050505; color: #0f0; font-family: 'Courier New', monospace; padding: 10px; height: 100px; overflow-y: auto; text-align: left; font-size: 0.8rem; border: 1px solid #333; margin-top: 10px; }

        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%,100% {transform:rotate(0);} 25% {transform:rotate(5deg);} 75% {transform:rotate(-5deg);} }
    </style>
</head>
<body>

    <div class="header"><h1>RPG Master Mobile + Roleta</h1></div>

    <div id="step1" class="container">
        <label>Estilo</label>
        <select id="style"><option value="jujutsu">Jujutsu Kaisen</option><option value="medieval">Medieval</option></select>
        <label>Jogadores</label>
        <input type="number" id="p-count" value="3" inputmode="numeric">
        <label>HP Inicial</label>
        <input type="number" id="p-hp" value="100" inputmode="numeric">
        <button onclick="proximo()">Configurar Grupo</button>
    </div>

    <div id="step2" class="container" style="display:none;">
        <div id="inputs"></div>
        <button onclick="confirmar()">Confirmar Tudo</button>
        <div id="sorteio-area" style="display:none; margin-top:15px; border-top:1px solid #444; padding-top:15px;">
            <div id="res-sorteio" style="color:gold;">Aguardando...</div>
            <button id="btn-rodar" onclick="girarIniciativa()">Sortear Iniciativa</button>
        </div>
    </div>

    <div id="rpg-panel">
        <div class="card">
            <h3>👥 Grupo</h3>
            <div id="painel-hp"></div>
            <div id="log">Sessão iniciada...</div>
        </div>

        <div class="card">
            <h3>🎲 Dados & Destino</h3>
            <div class="dice-area" id="dice-anchor">
                <img src="dado.png" class="dice-img">
                <div id="dice-result" class="dice-val">--</div>
            </div>
            <button onclick="jogarDado()">Lançar D20</button>
            
            <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
            
            <h3>🎡 Roleta de Alvos</h3>
            <div style="position:relative;">
                <div class="roulette-arrow"></div>
                <div id="roulette" class="roulette-box">
                    <span id="target-name" style="font-weight:bold; color:gold; text-align:center;">?</span>
                </div>
            </div>
            <button onclick="girarRoleta()" style="background:gold; color:black;">Girar Roleta</button>
        </div>
    </div>

    <script>
        let pList = []; let draft = []; let order = []; let max = 100;

        function log(msg) {
            const l = document.getElementById('log');
            l.innerHTML += `> ${msg}<br>`;
            l.scrollTop = l.scrollHeight;
        }

        function proximo() {
            const n = parseInt(document.getElementById('p-count').value);
            max = parseInt(document.getElementById('p-hp').value) || 100;
            const area = document.getElementById('inputs');
            area.innerHTML = '<h2>Personagens</h2>';
            for(let i=0; i<n; i++) {
                area.innerHTML += `<input type="text" placeholder="Nome do Jogador ${i+1}" class="in-n">`;
            }
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
        }

        function confirmar() {
            const nomes = document.querySelectorAll('.in-n');
            nomes.forEach((n, i) => pList.push({ nome: n.value || `Player ${i+1}`, hp: max }));
            draft = [...pList];
            document.getElementById('sorteio-area').style.display = 'block';
        }

        function girarIniciativa() {
            if(draft.length === 0) return;
            const p = draft.splice(Math.floor(Math.random()*draft.length), 1)[0];
            order.push(p);
            document.getElementById('res-sorteio').innerText = "Sorteado: " + p.nome;
            if(draft.length === 0) {
                const b = document.getElementById('btn-rodar');
                b.innerText = "Entrar no Painel"; b.style.background = "green";
                b.onclick = () => {
                    document.getElementById('step2').style.display = 'none';
                    document.getElementById('rpg-panel').style.display = 'flex';
                    render();
                };
            }
        }

        function render() {
            const area = document.getElementById('painel-hp');
            area.innerHTML = '';
            order.forEach((p, i) => {
                area.innerHTML += `<div class="hp-unit">
                    <div style="display:flex; justify-content:space-between; font-family:'MedievalSharp';">
                        <span>${p.nome}</span> <span id="txt-${i}">${p.hp}/${max}</span>
                    </div>
                    <div class="hp-bar-wrapper">
                        <img src="as.jpg" class="hp-heart">
                        <div class="hp-bar-bg"><div id="bar-${i}" class="hp-bar-fill"></div></div>
                    </div>
                    <div style="display:flex; gap:10px;">
                        <button onclick="m(${i},-10)" style="flex:1; background:#660708; padding:8px;">-10</button>
                        <button onclick="m(${i},10)" style="flex:1; background:#38b000; padding:8px;">+10</button>
                    </div>
                </div>`;
            });
        }

        function m(i, v) {
            const antigo = order[i].hp;
            order[i].hp = Math.max(0, Math.min(max, order[i].hp + v));
            document.getElementById(`bar-${i}`).style.width = (order[i].hp / max * 100) + "%";
            document.getElementById(`txt-${i}`).innerText = `${order[i].hp}/${max}`;
            log(`${order[i].nome} ${v > 0 ? 'curou' : 'perdeu'} ${Math.abs(v)} HP`);
        }

        function jogarDado() {
            const d = document.getElementById('dice-anchor');
            d.classList.add('shake');
            if(navigator.vibrate) navigator.vibrate(50); // Vibração mobile
            setTimeout(() => {
                const res = Math.floor(Math.random()*20)+1;
                document.getElementById('dice-result').innerText = res;
                d.classList.remove('shake');
                log(`Dado rolado: ${res}`);
            }, 400);
        }

        function girarRoleta() {
            const wheel = document.getElementById('roulette');
            const targetName = document.getElementById('target-name');
            const sorteado = order[Math.floor(Math.random()*order.length)];
            
            wheel.style.transform = `rotate(${360 * 5 + Math.random()*360}deg)`;
            targetName.innerText = "???";
            
            setTimeout(() => {
                targetName.innerText = sorteado.nome;
                log(`Roleta parou em: ${sorteado.nome}`);
            }, 3000);
        }
    </script>
</body>
</html>
