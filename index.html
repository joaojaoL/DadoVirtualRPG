<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUB RPG - AURAMAX</title>
    <style>
        :root {
            --vermelho: #ff0000;
            --azul: #0044ff;
            --preto: #050505;
            --cinza: #1a1a1a;
            --borda: 3px solid #333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--preto);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .painel {
            background: var(--cinza);
            border: 4px solid var(--azul);
            width: 100%;
            max-width: 1000px;
            padding: 20px;
            box-shadow: 10px 10px 0px var(--vermelho);
            margin-bottom: 30px;
        }

        h1, h2 {
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 20px;
            background: var(--vermelho);
            color: black;
            padding: 5px;
        }

        /* Form Estilizado */
        .setup-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        label { display: block; font-weight: bold; margin-bottom: 5px; color: var(--azul); }

        select, input {
            width: 100%;
            background: #000;
            border: 2px solid var(--vermelho);
            color: white;
            padding: 12px;
            font-size: 1rem;
            border-radius: 0; /* Quadradão */
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--azul);
            color: white;
            border: none;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
            border: 3px solid white;
        }

        button:hover { background: var(--vermelho); color: black; }

        /* Area de Jogo */
        #gameArea { display: none; width: 100%; max-width: 1200px; }

        .dice-section {
            text-align: center;
            padding: 20px;
            border: 4px solid var(--vermelho);
            margin-bottom: 20px;
            background: #000;
        }

        #d20 {
            width: 120px;
            filter: drop-shadow(0 0 10px var(--vermelho));
            cursor: pointer;
            transition: transform 0.1s;
        }

        #d20:active { transform: scale(0.8); }

        .result { font-size: 4rem; color: var(--azul); margin: 10px 0; font-weight: bold; }

        /* Grid de Fichas */
        .fichas-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .ficha-card {
            background: #0a0a0a;
            border: 2px solid var(--azul);
            padding: 15px;
            position: relative;
        }

        .ficha-card h3 {
            background: var(--azul);
            font-size: 0.9rem;
            padding: 3px;
            margin-bottom: 10px;
        }

        .ficha-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .ficha-inputs input, .ficha-inputs select {
            font-size: 0.8rem;
            padding: 8px;
        }

        .full-width { grid-column: span 2; }

        @media (max-width: 600px) {
            .fichas-container { grid-template-columns: 1fr; }
            .result { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div class="painel" id="setupForm">
        <h1>CONFIGURAÇÃO INICIAL</h1>
        <div class="setup-grid">
            <div>
                <label>ESTILO</label>
                <select id="estilo">
                    <option value="jjk">Jujutsu Kaisen</option>
                    <option value="jojo">JoJo's Bizarre Adventure</option>
                    <option value="onepiece">One Piece</option>
                    <option value="medieval">Medieval</option>
                    <option value="slasher">Slasher</option>
                    <option value="sobrenatural">Sobrenatural</option>
                    <option value="misterioso">Misterioso</option>
                </select>
            </div>
            <div>
                <label>PLAYERS (1-15)</label>
                <input type="number" id="numPlayers" min="1" max="15" value="1">
            </div>
            <div>
                <label>ONE SHOT?</label>
                <select id="oneshot">
                    <option>SIM</option>
                    <option>NÃO</option>
                </select>
            </div>
            <div>
                <label>DURAÇÃO</label>
                <select id="duracao"></select>
            </div>
        </div>
        <button onclick="gerarMesa()">GERAR MESA DE RPG</button>
    </div>

    <div id="gameArea">
        <div class="dice-section">
            <img src="dado.png" id="d20" alt="Dado" onclick="rolarDado()">
            <div class="result" id="resultado">--</div>
            <p style="color: var(--azul)">CLIQUE NO DADO PARA ROLAR</p>
        </div>

        <h2 id="tituloEstilo">FICHAS DOS JOGADORES</h2>
        <div class="fichas-container" id="containerFichas"></div>
    </div>

    <script>
        // Preencher dias
        const duracao = document.getElementById('duracao');
        for(let i=1; i<=30; i++) {
            let opt = document.createElement('option');
            opt.innerHTML = i + (i < 30 ? " Dias" : " Mês");
            duracao.appendChild(opt);
        }

        const classesDB = {
            jjk: ["Feiticeiro Graus 4-1", "Restrição Celestial", "Controlador de Sangue", "Usuário de Shikigami", "Mestre de Barreiras", "Inversão de Técnica", "Vaso de Maldição", "Xamã", "Lutador de Taijutsu", "Mestre de Ferramentas", "Discurso Amaldiçoado", "Transfiguração", "Projetista"],
            jojo: ["Stand Curto Alcance", "Stand Longo Alcance", "Stand Automático", "Hamon User", "Vampiro", "Ciborgue", "Spin Master", "Stand Utilitário", "Stand de Tempo", "Stand de Fenômeno", "Lutador", "Estrategista", "Stand de Cura"],
            onepiece: ["Espadachim", "Lutador de Tritão", "Cozinheiro", "Atirador", "Navegador", "Médico", "Arqueólogo", "Carpinteiro", "Músico", "Cientista", "Timoneiro", "Mink", "Gigante"],
            medieval: ["Guerreiro", "Mago", "Ladino", "Clérigo", "Bárbaro", "Paladino", "Arqueiro", "Druida", "Bardo", "Monge", "Feiticeiro", "Bruxo", "Cavaleiro"]
        };

        function gerarMesa() {
            const num = document.getElementById('numPlayers').value;
            const estilo = document.getElementById('estilo').value;
            const container = document.getElementById('containerFichas');
            
            document.getElementById('setupForm').style.display = 'none';
            document.getElementById('gameArea').style.display = 'block';
            document.getElementById('tituloEstilo').innerText = "CAMPANHA: " + estilo.toUpperCase();

            container.innerHTML = "";

            for(let i=1; i<=num; i++) {
                const card = document.createElement('div');
                card.className = 'ficha-card';
                
                // Define campo especial
                let especialLabel = "HABILIDADE";
                if(estilo === 'jjk') especialLabel = "ENERGIA AMALDIÇOADA";
                if(estilo === 'jojo') especialLabel = "STAND";
                if(estilo === 'onepiece') especialLabel = "FRUTA (OU ESTILO)";

                // Pega classes (ou usa padrão se não tiver no DB)
                const listaClasses = classesDB[estilo] || ["Classe 1", "Classe 2", "Classe 3", "Classe 4", "Classe 5", "Classe 6", "Classe 7", "Classe 8", "Classe 9", "Classe 10", "Classe 11", "Classe 12", "Classe 13"];
                let optionsClasses = listaClasses.map(c => `<option>${c}</option>`).join('');

                card.innerHTML = `
                    <h3>PLAYER ${i}</h3>
                    <div class="ficha-inputs">
                        <input type="text" placeholder="Nome">
                        <input type="text" placeholder="Idade">
                        <input type="text" placeholder="Altura">
                        <select>${optionsClasses}</select>
                        <input type="text" class="full-width" placeholder="${especialLabel}">
                    </div>
                `;
                container.appendChild(card);
            }
        }

        function rolarDado() {
            const display = document.getElementById('resultado');
            let count = 0;
            const intervalo = setInterval(() => {
                display.innerText = Math.floor(Math.random() * 20) + 1;
                count++;
                if(count > 10) {
                    clearInterval(intervalo);
                    display.style.color = (display.innerText == "20") ? "gold" : (display.innerText == "1" ? "red" : "var(--azul)");
                }
            }, 50);
        }
    </script>
</body>
</html>
