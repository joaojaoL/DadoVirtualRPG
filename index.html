<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Master - Dices & Life</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Oswald:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --red: #d90429; 
            --dark-red: #8d0801;
            --dark: #0b090a; 
            --card: #161a1d; 
            --white: #f5f3f4; 
            --grey: #b1a7a6;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--dark); 
            color: var(--white); 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #0b090a 100%);
        }
        
        .header { 
            background: linear-gradient(90deg, #660708, var(--red), #660708); 
            width: 100%; 
            padding: 25px 0; 
            text-align: center; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.8); 
            border-bottom: 3px solid var(--dark-red);
        }
        .header h1 { margin: 0; font-family: 'Oswald'; text-transform: uppercase; letter-spacing: 2px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }

        .container { 
            max-width: 650px; 
            width: 90%; 
            background: var(--card); 
            padding: 40px; 
            border-radius: 15px; 
            border: 1px solid #333;
            border-top: 8px solid var(--red); 
            margin: 40px 20px; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.7); 
            text-align: center; 
        }

        h2 { font-family: 'Oswald'; color: var(--white); text-transform: uppercase; margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        label { display: block; margin-top: 18px; font-weight: 600; color: var(--red); text-align: left; font-size: 0.9rem; text-transform: uppercase; }
        select, input, button { padding: 14px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; font-size: 1rem; background: #050505; color: white; width: 100%; box-sizing: border-box; transition: 0.3s; }
        
        input:focus, select:focus { border-color: var(--red); outline: none; box-shadow: 0 0 8px rgba(217, 4, 41, 0.3); }
        
        button { background: var(--red); border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; margin-top: 20px; }
        button:hover { background: #ef233c; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(217, 4, 41, 0.4); }

        /* Estilo das Fichas de Input */
        .player-card-input { 
            background: #1e1e1e; 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            border-left: 6px solid var(--red); 
            text-align: left;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .player-card-input h3 { grid-column: span 2; margin: 0 0 10px 0; color: var(--grey); font-size: 1rem; }
        .full-width { grid-column: span 2; }
        
        #rpg-panel { display: none; width: 95%; max-width: 1200px; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; padding: 30px; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* BARRINHA PIXEL ART */
        .hp-container { margin: 20px 0; background: #0b090a; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .hp-label { display: flex; justify-content: space-between; font-family: 'MedievalSharp'; margin-bottom: 8px; color: var(--grey); }
        .hp-bar-wrapper { display: flex; align-items: center; gap: 10px; }
        .hp-heart-img { width: 28px; height: 28px; filter: drop-shadow(0 0 5px var(--red)); }
        .hp-bar-bg { flex-grow: 1; height: 20px; background: #222; border: 2px solid #000; border-radius: 4px; position: relative; overflow: hidden; }
        .hp-bar-fill { height: 100%; background: #e63946; width: 100%; transition: width 0.5s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        .dice-box { position: relative; width: 180px; height: 180px; margin: 20px auto; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.2); border-radius: 50%; }
        .dice-val { position: absolute; font-size: 3.5rem; font-family: 'MedievalSharp'; font-weight: bold; color: white; text-shadow: 0 0 15px rgba(255,255,255,0.5); }
        
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% {transform: rotate(0deg);} 25% {transform: rotate(-10deg) scale(1.1);} 75% {transform: rotate(10deg) scale(1.1);} }
    </style>
</head>
<body>

    <div class="header"><h1>Painel do Mestre Online</h1></div>

    <div id="step1" class="container">
        <h2>Configurar Sessão</h2>
        
        <label>Estilo do RPG</label>
        <select id="rpg-style">
            <option value="jujutsu">Jujutsu Kaisen</option>
            <option value="medieval">Medieval Fantasia</option>
            <option value="slasher">Slasher (Terror)</option>
            <option value="roça">Aventuras na Roça</option>
        </select>

        <label>Vai ser One Shot?</label>
        <select id="one-shot">
            <option value="Sim">Sim</option>
            <option value="Não">Não</option>
        </select>

        <label>Duração da Campanha</label>
        <select id="duration">
            <option value="1 dia">1 Dia</option>
            <option value="2 dias">2 Dias</option>
            <option value="3 dias">3 Dias</option>
            <option value="4 dias">4 Dias</option>
            <option value="5 dias">5 Dias</option>
            <option value="1 semana">1 Semana</option>
            <option value="1 mes">1 Mês</option>
            <option value="2 meses">2 Meses</option>
            <option value="3 meses">3 Meses</option>
            <option value="4 meses">4 Meses</option>
            <option value="5 meses">5 Meses</option>
        </select>

        <label>Quantidade de Jogadores</label>
        <input type="number" id="p-count" value="3" min="1" max="10">

        <label>HP Inicial Sugerido</label>
        <input type="number" id="p-hp-base" value="100">

        <button type="button" onclick="proximoPasso()">Configurar Jogadores</button>
    </div>

    <div id="step2" class="container" style="display:none; max-width: 800px;">
        <h2>Fichas dos Personagens</h2>
        <div id="inputs-container"></div>
        <button type="button" onclick="confirmarFichas()">Gerar Ordem de Iniciativa</button>
        
        <div id="sorteio-box" style="display:none; margin-top:30px; border-top: 2px solid #333; padding-top: 20px;">
            <div id="res-sorteio" style="font-size: 1.5rem; color: #ffb703; margin-bottom: 15px; font-family: 'Oswald';">Aguardando Sorteio...</div>
            <button id="btn-rodar" onclick="girarSorteio()" style="background: #38b000;">Sortear Próximo</button>
