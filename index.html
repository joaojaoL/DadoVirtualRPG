<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Master - Edição Final</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #d90429; --dark: #0b090a; --card: #161a1d; --white: #f5f3f4; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--white); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        .header { background: var(--red); width: 100%; padding: 20px 0; text-align: center; box-shadow: 0 4px 10px #000; }
        .header h1 { margin: 0; font-family: 'Oswald'; text-transform: uppercase; }

        .container { max-width: 600px; width: 90%; background: var(--card); padding: 30px; border-radius: 12px; border-top: 6px solid var(--red); margin: 20px; box-shadow: 0 10px 30px #000; text-align: center; }
        
        label { display: block; margin-top: 15px; font-weight: bold; color: var(--red); text-align: left; }
        select, input, button { padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #444; font-size: 1rem; background: #0b090a; color: white; width: 100%; box-sizing: border-box; }
        
        button { background: var(--red); border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        button:hover { background: #ef233c; transform: scale(1.02); }

        .player-row { background: #252525; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid var(--red); display: flex; gap: 10px; }
        
        #rpg-panel { display: none; width: 95%; max-width: 1200px; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid #333; text-align: center; }

        /* BARRINHA PIXEL ART */
        .hp-container { margin: 15px 0; background: #222; padding: 10px; border-radius: 8px; border: 1px solid #444; }
        .hp-label { display: flex; justify-content: space-between; font-family: 'MedievalSharp'; margin-bottom: 5px; }
        .hp-bar-wrapper { display: flex; align-items: center; gap: 8px; }
        .hp-heart-img { width: 24px; height: 24px; object-fit: contain; image-rendering: pixelated; }
        .hp-bar-bg { flex-grow: 1; height: 16px; background: #444; border: 2px solid #000; border-radius: 2px; position: relative; overflow: hidden; }
        .hp-bar-fill { height: 100%; background: #e63946; width: 100%; transition: width 0.4s ease-in-out; box-shadow: inset 0 2px 0 rgba(255,255,255,0.2); }

        .dice-box { position: relative; width: 140px; height: 140px; margin: 10px auto; }
        .dice-img { width: 100%; height: 100%; object-fit: contain; }
        .dice-val { position: absolute; top: 52%; left: 50%; transform: translate(-50%, -50%); font-size: 2.2rem; font-family: 'MedievalSharp'; font-weight: bold; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body>

    <div class="header"><h1>Mestre de RPG Online</h1></div>

    <div id="step1" class="container">
        <h2>Configurar Sessão</h2>
        <label>Estilo do RPG</label>
        <select id="rpg-style">
            <option value="jujutsu">Jujutsu Kaisen</option>
            <option value="medieval">Medieval</option>
            <option value="slasher">Slasher (Terror)</option>
            <option value="roça">Aventuras na Roça</option>
            <option value="anime">Anime Shonen</option>
            <option value="ficcao">Ficção Científica</option>
        </select>

        <label>Vai ser uma One Shot?</label>
        <select id="one-shot">
            <option value="Sim">Sim</option>
            <option value="Não">Não</option>
        </select>

        <label>Duração da Campanha</label>
        <select id="duration">
            <option value="1 dia">1 Dia</option>
            <option value="1 semana">1 Semana</option>
            <option value="1 mês">1 Mês</option>
            <option value="2 meses">2 Meses</option>
            <option value="3 meses">3 Meses</option>
            <option value="4 meses">4 Meses</option>
            <option value="5 meses">5 Meses</option>
        </select>

        <label>Número de Jogadores</label>
        <input type="number" id="p-count" value="3" min="1">

        <label>Vida (HP) Inicial</label>
        <input type="number" id="p-hp-base" value="100">

        <button type="button" onclick="proximoPasso()">Configurar Jogadores</button>
    </div>

    <div id="step2" class="container" style="display:none;">
        <h2>Fichas e Iniciativa</h2>
        <div id="inputs-container"></div>
        <button type="button" onclick="confirmarFichas()">Confirmar Personagens</button>
        
        <div id="sorteio-box" style="display:none; margin-top:20px; border-top: 1px solid #444; padding-top: 20px;">
            <div id="res-sorteio" style="font-size: 1.3rem; color: #ffb703; margin-bottom: 10px;">Aguardando Sorteio...</div>
            <button id="btn-rodar" onclick="girarSorteio()">Sortear Próximo</button>
        </div>
    </div>

    <div id="rpg-panel">
        <div class="card">
            <h3>👥 Status da Vida</h3>
            <div id="final-hp-list"></div>
        </div>

        <div class="card">
            <h3>🎲 Dado D20</h3>
            <div class="dice-box">
                <img src="dado-20-lados.png" class="dice-img">
                <div id="dice-result" class="dice-val">--</div>
            </div>
            <button onclick="jogarDado()">Lançar Dado</button>
        </div>
    </div>

    <script>
        let players = [];
        let draftList = [];
        let finalOrder = [];
        let maxHP = 100;

        function proximoPasso() {
            const qtd = parseInt(document.getElementById('p-count').value);
            maxHP = parseInt(document.getElementById('p-hp-base').value) || 100;
            const style = document.getElementById('rpg-style').value;
            
            const area = document.getElementById('inputs-container');
            area.innerHTML = '';
            
            const classesMap = {
                jujutsu: ["Maldição", "Humano", "Feiticeiro", "Caçador de Feiticeiro", "Receptáculo"],
                roça: ["Fazendeiro", "Peão", "Benzedeira", "Vaqueiro", "Mateiro"],
                slasher: ["Sobrevivente", "Final Girl", "Nerd", "Policial"]
            };
            const classes = classesMap[style] || ["Guerreiro", "Mago", "Ladino", "Arqueiro"];

            for(let i=0; i<qtd; i++) {
                let options = classes.map(c => `<option value="${c}">${c}</option>`).join('');
                area.innerHTML += `
                    <div class="player-row">
                        <input type="text" placeholder="Nome do Personagem" class="in-nome">
                        <select class="in-classe">${options}</select>
                    </div>`;
            }

            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
        }

        function confirmarFichas() {
            const nomes = document.querySelectorAll('.in-nome');
            const classes = document.querySelectorAll('.in-classe');
            players = [];
            nomes.forEach((n, i) => {
                players.push({ nome: n.value || `Herói ${i+1}`, classe: classes[i].value, hp: maxHP });
            });
            draftList = [...players];
            document.getElementById('sorteio-box').style.display = 'block';
        }

        function girarSorteio() {
            if(draftList.length === 0) return;
            const idx = Math.floor(Math.random() * draftList.length);
            const escolhido = draftList.splice(idx, 1)[0];
            finalOrder.push(escolhido);
            document.getElementById('res-sorteio').innerText = `Sorteado: ${escolhido.nome}`;

            if(draftList.length === 0) {
                const b = document.getElementById('btn-rodar');
                b.innerText = "Entrar no Painel";
                b.style.background = "#38b000";
                b.onclick = () => {
                    document.getElementById('step2').style.display = 'none';
                    document.getElementById('rpg-panel').style.display = 'grid';
                    carregarPainel();
                };
            }
        }

        function carregarPainel() {
            const container = document.getElementById('final-hp-list');
            container.innerHTML = '';
            finalOrder.forEach((p, i) => {
                container.innerHTML += `
                    <div class="hp-container">
                        <div class="hp-label">
                            <span>${p.nome} (${p.classe})</span>
                            <span id="num-hp-${i}">${p.hp}/${maxHP}</span>
                        </div>
                        <div class="hp-bar-wrapper">
                            <img src="as.jpg" class="hp-heart-img">
                            <div class="hp-bar-bg">
                                <div id="bar-fill-${i}" class="hp-bar-fill"></div>
                            </div>
                        </div>
                        <div style="display:flex; gap:10px; margin-top:8px;">
                            <button onclick="mudarVida(${i}, -10)" style="flex:1; background:#660708; padding:5px !important;">-10</button>
                            <button onclick="mudarVida(${i}, 10)" style="flex:1; background:#38b000; padding:5px !important;">+10</button>
                        </div>
                    </div>`;
            });
        }

        function mudarVida(idx, valor) {
            finalOrder[idx].hp = Math.max(0, Math.min(maxHP, finalOrder[idx].hp + valor));
            const porcentagem = (finalOrder[idx].hp / maxHP) * 100;
            document.getElementById(`bar-fill-${idx}`).style.width = porcentagem + "%";
            document.getElementById(`num-hp-${idx}`).innerText = `${finalOrder[idx].hp}/${maxHP}`;
        }

        function jogarDado() {
            document.getElementById('dice-result').innerText = Math.floor(Math.random()*20)+1;
        }
    </script>
</body>
</html>
