<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG MASTER - CLASSIC TACTICAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --red: #d90429; --dark: #0b090a; --card: #161a1d; --white: #f5f3f4; }
        * { border-radius: 0 !important; box-sizing: border-box; }
        body { font-family: 'Roboto Mono', monospace; background: var(--dark); color: var(--white); margin: 0; padding-bottom: 50px; }
        
        .header { background: var(--red); padding: 15px; text-align: center; border-bottom: 5px solid #000; }
        .header h1 { margin: 0; font-family: 'Oswald'; text-transform: uppercase; font-size: 1.3rem; text-shadow: 2px 2px #000; }
        
        .container { width: 95%; max-width: 800px; background: var(--card); padding: 20px; border: 2px solid var(--red); margin: 15px auto; box-shadow: 8px 8px 0px #000; }
        
        input, select, textarea { padding: 12px; margin: 5px 0; border: 2px solid #444; background: #000; color: #fff; width: 100%; font-size: 16px; outline: none; }
        button { background: var(--red); color: white; border: none; padding: 12px; width: 100%; font-family: 'Oswald'; text-transform: uppercase; cursor: pointer; margin-top: 10px; box-shadow: 4px 4px 0px #000; }
        button:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }

        /* MODAL VOLTAR */
        #modal-back { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: var(--card); padding: 25px; border: 3px solid var(--red); text-align: center; }

        /* GRID */
        #rpg-panel { display: none; width: 96%; margin: 10px auto; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 900px) { #rpg-panel { grid-template-columns: 1fr 1fr; } }

        .card { background: var(--card); padding: 15px; border: 2px solid #333; }
        h3 { font-family: 'Oswald'; border-bottom: 2px solid var(--red); padding-bottom: 5px; margin-top: 0; }

        /* CHAT EM LISTA */
        #chat-box { height: 300px; overflow-y: auto; background: #000; border: 1px solid #222; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .msg-item { border-left: 3px solid var(--red); padding: 5px 8px; background: #0a0a0a; margin-bottom: 2px; font-size: 0.85rem; }
        .msg-item b { color: var(--red); display: block; font-size: 0.7rem; }

        /* DADO */
        .dice-box { text-align: center; background: #000; padding: 15px; border: 1px solid #333; }
        #dice-img { width: 90px; height: 90px; transition: 0.5s; }
        #dice-res { font-family: 'Oswald'; font-size: 2rem; margin-top: -20px; color: #fff; text-shadow: 0 0 5px var(--red); }

        .hp-bar { height: 15px; background: #222; border: 1px solid #000; margin-top: 5px; }
        .hp-fill { height: 100%; background: var(--red); transition: 0.3s; }
    </style>
</head>
<body>

    <div id="modal-back">
        <div class="modal-content">
            <h3>Você quer realmente voltar?</h3>
            <button onclick="location.reload()">SIM</button>
            <button onclick="document.getElementById('modal-back').style.display='none'">NÃO</button>
        </div>
    </div>

    <div class="header"><h1>RPG MASTER TACTICAL</h1></div>

    <div id="nav-btns" style="width:95%; margin:10px auto; display:none">
        <button onclick="document.getElementById('modal-back').style.display='flex'" style="width:auto; padding:5px 15px; font-size:0.7rem">⬅ VOLTAR</button>
    </div>

    <div id="screen-setup" class="container">
        <h3>Escolha o Modo</h3>
        <button onclick="isOnline=true; show('screen-lobby')">ONLINE (FIREBASE)</button>
        <button onclick="isOnline=false; isMaster=true; show('screen-casual')">CASUAL (LOCAL)</button>
    </div>

    <div id="screen-lobby" class="container" style="display:none">
        <h3>Salas Online</h3>
        <div id="room-list"></div>
        <input type="text" id="room-name" placeholder="Nome da Sala">
        <select id="room-theme"></select>
        <button onclick="criarSala()">CRIAR SALA</button>
    </div>

    <div id="screen-casual" class="container" style="display:none">
        <h3>Configuração Local</h3>
        <select id="casual-theme"></select>
        <input type="number" id="p-count" value="2">
        <button onclick="setupFichas(document.getElementById('p-count').value)">GERAR FICHAS</button>
    </div>

    <div id="screen-fichas" class="container" style="display:none">
        <h3>Registro de Heróis</h3>
        <div id="fichas-area"></div>
        <button onclick="iniciarJogo()">INICIAR AVENTURA</button>
    </div>

    <div id="rpg-panel">
        <div class="card">
            <h3>[EQUIPE]</h3>
            <div id="player-list"></div>
        </div>

        <div class="card" id="chat-ui">
            <h3>[CHAT]</h3>
            <div id="chat-box"></div>
            <div style="display:flex; gap:5px; margin-top:5px">
                <input type="text" id="chat-in" placeholder="Diga algo...">
                <button onclick="enviar()" style="width:60px; margin:0">OK</button>
            </div>
        </div>

        <div class="card">
            <h3>[DADOS]</h3>
            <div class="dice-box">
                <img src="dado.png" id="dice-img">
                <div id="dice-res">--</div>
            </div>
            <div class="master-only" style="display:none">
                <select id="dice-type"><option value="20">D20</option><option value="6">D6</option></select>
                <button onclick="rolar()">ROLAR DADO</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyA3-yiNczMAF4sdZ9kog4ovXc75fciaN2g", authDomain: "meudadovirtualok.firebaseapp.com", projectId: "meudadovirtualok", databaseURL: "https://meudadovirtualok-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let isOnline = false, isMaster = false, room = "", myChar = "", players = [], currentTheme = "";

        const themes = { jujutsu: ["Feiticeiro", "Selo"], onepiece: ["Pirata", "Marinha"], medieval: ["Guerreiro", "Mago"] };
        ['room-theme', 'casual-theme'].forEach(id => { for(let t in themes) document.getElementById(id).innerHTML += `<option value="${t}">${t.toUpperCase()}</option>`; });

        function show(id) { 
            document.querySelectorAll('.container, #rpg-panel').forEach(e => e.style.display='none');
            document.getElementById(id).style.display = (id==='rpg-panel' ? 'grid' : 'block');
            if(id !== 'screen-setup') document.getElementById('nav-btns').style.display = 'block';
        }

        db.ref('rooms').on('value', snap => {
            const l = document.getElementById('room-list'); l.innerHTML = "";
            snap.forEach(s => l.innerHTML += `<button onclick="entrar('${s.key}')" style="font-size:0.7rem; margin:2px">${s.key}</button>`);
        });

        function entrar(n) { room = n; isMaster = false; db.ref('rooms/'+n+'/theme').once('value', s => { currentTheme = s.val(); setupFichas(1); }); }

        function criarSala() {
            room = document.getElementById('room-name').value;
            currentTheme = document.getElementById('room-theme').value;
            if(!room) return; isMaster = true;
            db.ref('rooms/'+room).set({ theme: currentTheme });
            setupFichas(1);
        }

        function setupFichas(qtd) {
            show('screen-fichas');
            const area = document.getElementById('fichas-area'); area.innerHTML = "";
            for(let i=0; i<qtd; i++) {
                area.innerHTML += `<div style="border:1px solid #444; padding:10px; margin-bottom:10px">
                    <input type="text" class="p-nome" placeholder="Nome">
                    <input type="text" class="p-alt" placeholder="Altura">
                    <input type="text" class="p-peso" placeholder="Peso">
                    <input type="number" class="p-hp" value="100">
                </div>`;
            }
        }

        function iniciarJogo() {
            const nomes = document.querySelectorAll('.p-nome'), hps = document.querySelectorAll('.p-hp'), alts = document.querySelectorAll('.p-alt'), pes = document.querySelectorAll('.p-peso');
            if(isOnline) {
                myChar = nomes[0].value || "Player";
                db.ref(`rooms/${room}/players/${myChar}`).set({ nome: myChar, hp: parseInt(hps[0].value), max: parseInt(hps[0].value), alt: alts[0].value, peso: pes[0].value });
            } else {
                nomes.forEach((n, i) => players.push({ nome: n.value, hp: parseInt(hps[i].value), max: parseInt(hps[i].value), alt: alts[i].value, peso: pes[i].value }));
                document.getElementById('chat-ui').style.display = 'none';
            }
            show('rpg-panel');
            if(isMaster) document.querySelectorAll('.master-only').forEach(e => e.style.display='block');
            
            if(isOnline) {
                db.ref(`rooms/${room}/players`).on('value', snap => {
                    const l = document.getElementById('player-list'); l.innerHTML = "";
                    snap.forEach(p => {
                        const d = p.val(); const pct = (d.hp/d.max)*100;
                        l.innerHTML += `<div style="margin-bottom:10px"><b>${d.nome}</b> (${d.hp}HP) <br><small>${d.alt} | ${d.peso}</small>
                        <div class="hp-bar"><div class="hp-fill" style="width:${pct}%"></div></div>
                        ${isMaster ? `<button onclick="db.ref('rooms/${room}/players/${d.nome}/hp').transaction(c=>(c||0)-10)" style="padding:2px; font-size:0.6rem">-10 HP</button>` : ''}</div>`;
                    });
                });
                db.ref(`rooms/${room}/chat`).on('child_added', snap => {
                    const b = document.getElementById('chat-box');
                    b.innerHTML += `<div class="msg-item"><b>${snap.val().u}</b> ${snap.val().t}</div>`;
                    b.scrollTop = b.scrollHeight;
                });
                db.ref(`rooms/${room}/dice`).on('value', snap => { if(snap.val()) document.getElementById('dice-res').innerText = snap.val(); });
            } else { renderLocal(); }
        }

        function renderLocal() {
            const l = document.getElementById('player-list'); l.innerHTML = "";
            players.forEach((p, i) => {
                l.innerHTML += `<div><b>${p.nome}</b> (${p.hp}HP)<div class="hp-bar"><div class="hp-fill" style="width:${(p.hp/p.max)*100}%"></div></div>
                <button onclick="players[${i}].hp-=10; renderLocal()">-10 HP</button></div>`;
            });
        }

        function enviar() {
            const i = document.getElementById('chat-in'); if(!i.value) return;
            db.ref(`rooms/${room}/chat`).push({ u: myChar, t: i.value });
            i.value = "";
        }

        function rolar() {
            const d = document.getElementById('dice-type').value;
            const r = Math.floor(Math.random() * d) + 1;
            const img = document.getElementById('dice-img');
            img.style.transform = "rotate(360deg)";
            setTimeout(() => {
                img.style.transform = "rotate(0deg)";
                document.getElementById('dice-res').innerText = r;
                if(isOnline) db.ref(`rooms/${room}/dice`).set(r);
            }, 500);
        }
    </script>
</body>
</html>
