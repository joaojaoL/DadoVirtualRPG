<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Master - Tactical Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --red: #d90429; 
            --dark: #0b090a; 
            --card: #161a1d; 
            --white: #f5f3f4; 
            --border: #333;
        }

        body { 
            font-family: 'Roboto Mono', monospace; 
            background: var(--dark); 
            color: var(--white); 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; 
        }
        
        /* Layout Quadrado */
        .header { 
            background: var(--red); 
            width: 100%; padding: 20px 0; 
            text-align: center; border-bottom: 4px solid #800000;
        }
        .header h1 { margin: 0; font-family: 'Oswald'; text-transform: uppercase; letter-spacing: 1px; }

        .container { 
            max-width: 650px; width: 90%; 
            background: var(--card); 
            padding: 30px; 
            border: 2px solid var(--border); /* Visual Quadrado */
            margin: 40px 20px; 
            box-shadow: 10px 10px 0px rgba(0,0,0,1); /* Sombra bloco */
        }

        h2 { font-family: 'Oswald'; text-transform: uppercase; border-bottom: 2px solid var(--red); padding-bottom: 5px; margin-top: 0; }
        
        label { display: block; margin-top: 15px; font-weight: bold; color: var(--red); text-align: left; font-size: 0.85rem; }
        
        select, input, textarea { 
            padding: 12px; margin: 8px 0; 
            border: 2px solid var(--border); 
            background: #000; color: #fff; 
            width: 100%; box-sizing: border-box; 
            border-radius: 0; /* Remove arredondamento */
        }

        /* Correção do Botão */
        button { 
            background: var(--red); 
            color: white; border: none; 
            padding: 15px; width: 100%; 
            font-family: 'Oswald'; font-size: 1.1rem; 
            text-transform: uppercase; cursor: pointer; 
            margin-top: 20px; transition: 0.2s;
            display: block; /* Garante que ocupe a linha */
        }
        button:hover { background: #ff002b; outline: 2px solid white; }

        .player-card-input { 
            border: 2px solid var(--red); 
            padding: 15px; margin-bottom: 20px; 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }

        #rpg-panel { display: none; width: 98%; max-width: 1300px; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: var(--card); padding: 20px; border: 2px solid var(--border); }

        /* HP Bar Square */
        .hp-bar-bg { height: 25px; background: #222; border: 2px solid #000; position: relative; }
        .hp-bar-fill { height: 100%; background: var(--red); width: 100%; transition: 0.3s; }

        .dice-box { width: 100px; height: 100px; border: 3px solid var(--red); margin: 20px auto; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; }
        
        .notes-area { grid-column: 1 / -1; background: #000; border: 1px dashed var(--red); padding: 15px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="header"><h1>Mestre de RPG - Terminal</h1></div>

    <div id="step1" class="container">
        <h2>Configurar Sessão</h2>
        <label>ESTILO DO RPG</label>
        <select id="rpg-style">
            <option value="jujutsu">Jujutsu Kaisen</option>
            <option value="medieval">Medieval</option>
            <option value="slasher">Slasher</option>
            <option value="roça">Aventuras na Roça</option>
        </select>

        <label>ONE SHOT?</label>
        <select id="one-shot">
            <option value="Sim">Sim</option>
            <option value="Não">Não</option>
        </select>

        <label>DURAÇÃO</label>
        <select id="duration">
            <option value="1 dia">1 Dia</option>
            <option value="1 semana">1 Semana</option>
            <option value="1 mes">1 Mês</option>
            <option value="5 meses">5 Meses</option>
        </select>

        <label>QTD. JOGADORES</label>
        <input type="number" id="p-count" value="2">

        <label>HP INICIAL</label>
        <input type="number" id="p-hp-base" value="100">

        <button onclick="proximoPasso()">Configurar Jogadores</button>
    </div>

    <div id="step2" class="container" style="display:none;">
        <h2>Fichas Técnicas</h2>
        <div id="inputs-container"></div>
        <button onclick="confirmarFichas()">Finalizar Configuração</button>
    </div>

    <div id="rpg-panel">
        <div class="card">
            <h3>[STATUS DOS JOGADORES]</h3>
            <div id="final-hp-list"></div>
        </div>

        <div class="card">
            <h3>[DADOS E LOGS]</h3>
            <select id="dado-seletor"><option value="20">D20</option><option value="6">D6</option></select>
            <div id="dice-result" class="dice-box">--</div>
            <button onclick="jogarDado()">Rolar Dado</button>
            
            <div class="notes-area">
                <label style="margin:0">NOTAS DO MESTRE</label>
                <textarea id="master-notes" rows="10" placeholder="Escreva aqui eventos importantes..."></textarea>
            </div>
        </div>
    </div>

    <script>
        let finalOrder = [];
        let maxHP = 100;

        const classesData = {
            medieval: ["Viking", "Arqueiro", "Mago", "Guerreiro", "Ladino", "Paladino", "Bárbaro", "Bardo", "Druida", "Monge", "Feiticeiro", "Necromante", "Alquimista"],
            jujutsu: ["Feiticeiro", "Usuário de Maldição", "Maldição", "Restrição Celestial", "Xamã", "Invocador", "Mestre de Barreiras", "Grau 1", "Grau 2", "Grau 3", "Grau 4", "Especial", "Corpo Amaldiçoado"],
            slasher: ["Médico", "Militar", "Estudante", "Policial", "Sobrevivente", "Cozinheiro", "Mecânico", "Zelador", "Atleta", "Nerd", "Popular", "Cético", "Repórter"],
            roça: ["Vaqueiro", "Peão", "Benzedeira", "Fazendeiro", "Mateiro", "Violeiro", "Capataz", "Agrônomo", "Veterinário", "Pescador", "Lenhador", "Artesão", "Caminhoneiro"]
        };

        function proximoPasso() {
            const qtd = parseInt(document.getElementById('p-count').value);
            const style = document.getElementById('rpg-style').value;
            maxHP = parseInt(document.getElementById('p-hp-base').value) || 100;
            const area = document.getElementById('inputs-container');
            area.innerHTML = '';
            
            const classes = classesData[style] || classesData.medieval;

            for(let i=0; i<qtd; i++) {
                let options = classes.map(c => `<option value="${c}">${c}</option>`).join('');
                area.innerHTML += `
                    <div class="player-card-input">
                        <input type="text" placeholder="Nome" class="in-nome" style="grid-column: span 2">
                        <input type="number" placeholder="Idade" class="in-idade">
                        <select class="in-classe">${options}</select>
                        <input type="text" placeholder="Altura" class="in-altura">
                        <input type="text" placeholder="Peso" class="in-peso">
                        <input type="number" placeholder="${style==='jujutsu'?'Energia':'Atributo'}" class="in-extra" style="grid-column: span 2">
                    </div>`;
            }
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
        }

        function confirmarFichas() {
            const cards = document.querySelectorAll('.player-card-input');
            finalOrder = [];
            cards.forEach((card, i) => {
                finalOrder.push({
                    nome: card.querySelector('.in-nome').value || `J${i+1}`,
                    classe: card.querySelector('.in-classe').value,
                    hp: maxHP,
                    extra: card.querySelector('.in-extra').value || 0
                });
            });
            document.getElementById('step2').style.display = 'none';
            document.getElementById('rpg-panel').style.display = 'grid';
            carregarPainel();
        }

        function carregarPainel() {
            const container = document.getElementById('final-hp-list');
            container.innerHTML = '';
            finalOrder.forEach((p, i) => {
                container.innerHTML += `
                    <div style="border: 1px solid #444; padding: 10px; margin-bottom: 10px;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px">
                            <span><b>${p.nome}</b> (${p.classe})</span>
                            <span id="num-hp-${i}">${p.hp}/${maxHP}</span>
                        </div>
                        <div class="hp-bar-bg"><div id="bar-fill-${i}" class="hp-bar-fill"></div></div>
                        <div style="display:flex; gap:5px; margin-top:5px;">
                            <button onclick="mudarVida(${i}, -10)" style="flex:1; padding:5px; margin:0">-10</button>
                            <button onclick="mudarVida(${i}, 10)" style="flex:1; padding:5px; margin:0; background:#1b4332">+10</button>
                        </div>
                        <textarea placeholder="Inventário..." style="margin-top:10px; height:60px; font-size:0.7rem"></textarea>
                    </div>`;
            });
        }

        function mudarVida(idx, valor) {
            finalOrder[idx].hp = Math.max(0, Math.min(maxHP, finalOrder[idx].hp + valor));
            const pct = (finalOrder[idx].hp / maxHP) * 100;
            document.getElementById(`bar-fill-${idx}`).style.width = pct + "%";
            document.getElementById(`num-hp-${idx}`).innerText = `${finalOrder[idx].hp}/${maxHP}`;
        }

        function jogarDado() {
            const lados = document.getElementById('dado-seletor').value;
            const res = Math.floor(Math.random() * lados) + 1;
            document.getElementById('dice-result').innerText = res;
        }
    </script>
</body>
</html>
