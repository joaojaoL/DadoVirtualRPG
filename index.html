<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG SYSTEM - DADOS E FICHAS</title>
    <style>
        :root {
            --vermelho: #E60000;
            --azul: #0044CC;
            --preto: #000000;
            --cinza: #121212;
            --borda: 4px solid #fff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--preto);
            color: #fff;
            font-family: 'Impact', 'Arial Black', sans-serif;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* CONTAINER QUADRADÃO */
        .box {
            background: var(--cinza);
            border: 5px solid var(--azul);
            width: 100%;
            max-width: 1100px;
            padding: 20px;
            box-shadow: 10px 10px 0px var(--vermelho);
            margin-bottom: 25px;
        }

        h1 {
            background: var(--vermelho);
            text-align: center;
            padding: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            border: 2px solid #000;
        }

        .pergunta { margin-bottom: 15px; }
        label { display: block; color: var(--azul); margin-bottom: 5px; font-size: 14px; }

        select, input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 3px solid var(--vermelho);
            color: #fff;
            font-family: sans-serif;
            font-weight: bold;
            border-radius: 0;
        }

        .btn-start {
            width: 100%;
            padding: 20px;
            background: var(--azul);
            color: #fff;
            border: 4px solid #fff;
            cursor: pointer;
            font-size: 1.5rem;
            margin-top: 10px;
        }

        .btn-start:hover { background: var(--vermelho); }

        /* MESA DE JOGO */
        #gameScreen { display: none; width: 100%; max-width: 1200px; }

        .dice-zone {
            text-align: center;
            border: 5px solid var(--vermelho);
            padding: 20px;
            background: #000;
            margin-bottom: 20px;
        }

        #dadoImg {
            width: 130px;
            cursor: pointer;
            transition: 0.1s;
        }

        #dadoImg:active { transform: scale(0.9) rotate(15deg); }

        .roll-result {
            font-size: 5rem;
            color: var(--azul);
            text-shadow: 4px 4px 0px #fff;
        }

        /* GRID DE FICHAS */
        .fichas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .ficha {
            background: #080808;
            border: 3px solid var(--azul);
            padding: 15px;
        }

        .ficha-head {
            background: var(--azul);
            padding: 5px;
            margin-bottom: 15px;
            font-size: 12px;
            text-align: center;
        }

        .campos {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .span2 { grid-column: span 2; }

        @media (max-width: 600px) {
            .fichas-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="box" id="setup">
        <h1>CONFIGURAR RPG</h1>
        <div class="pergunta">
            <label>ESTILO DO MUNDO</label>
            <select id="estilo">
                <option value="jojo">JoJo's Bizarre Adventure</option>
                <option value="jjk">Jujutsu Kaisen</option>
                <option value="paranormal">Paranormal / Sobrenatural</option>
                <option value="medieval">Medieval Fantasia</option>
                <option value="onepiece">One Piece</option>
                <option value="slasher">Slasher (Terror)</option>
            </select>
        </div>
        <div class="pergunta">
            <label>NÚMERO DE PLAYERS (1-15)</label>
            <input type="number" id="players" min="1" max="15" value="1">
        </div>
        <div class="pergunta">
            <label>É UMA ONE SHOT?</label>
            <select id="oneshot">
                <option>SIM</option>
                <option>NÃO</option>
            </select>
        </div>
        <div class="pergunta">
            <label>DURAÇÃO APROXIMADA</label>
            <select id="tempo"></select>
        </div>
        <button class="btn-start" onclick="iniciarMesa()">ABRIR MESA</button>
    </div>

    <div id="gameScreen">
        <div class="dice-zone">
            <img src="dado.png" id="dadoImg" alt="DADO" onclick="rolar()">
            <div class="roll-result" id="res">--</div>
            <p>CLIQUE NO DADO PARA ROLAR</p>
        </div>
        <div class="fichas-grid" id="fichasContainer"></div>
    </div>

    <script>
        // Gerar 30 dias no select
        const t = document.getElementById('tempo');
        for(let i=1; i<=30; i++) {
            let o = document.createElement('option');
            o.text = i + (i==30 ? " Mês" : " Dias");
            t.add(o);
        }

        const classesDB = {
            jojo: ["Stand Curto Alcance", "Stand Longo Alcance", "Stand Automático", "Stand de Cura", "Stand de Reconhecimento", "Stand de Tempo", "Stand de Espaço", "Usuário de Hamon", "Vampiro", "Ciborgue Alemão", "Mestre do Spin", "Stand Fenômeno", "Usuário de Objeto Amaldiçoado"],
            jjk: ["Feiticeiro de Grau Especial", "Feiticeiro Grau 1", "Usuário de Shikigami", "Restrição Celestial (Física)", "Restrição Celestial (Energia)", "Manipulador de Sangue", "Mestre de Barreiras", "Discurso Amaldiçoado", "Técnica de Projeção", "Usuário de Ferramentas", "Vaso de Maldição", "Mestre de Taijutsu", "Médico de Técnica Reversa"],
            paranormal: ["Exorcista", "Médium", "Detetive Espiritual", "Caçador de Monstros", "Ocultista", "Inquisidor", "Cientista Paranormal", "Possuído (Controlado)", "Ceifador", "Vidente", "Relicário Vivo", "Necromante", "Andarilho do Purgatório"],
            medieval: ["Guerreiro", "Mago", "Ladino", "Clérigo", "Paladino", "Bárbaro", "Arqueiro", "Druida", "Bardo", "Monge", "Bruxo", "Feiticeiro", "Cavaleiro Real"],
            onepiece: ["Espadachim (Santoryu/Nitoryu)", "Atirador", "Cozinheiro de Combate", "Médico Pirata", "Navegador Habilidoso", "Arqueólogo", "Carpinteiro", "Músico", "Lutador Tritão", "Mink Guerreiro", "Cientista Fora da Lei", "Timoneiro de Elite", "Gigante"],
            slasher: ["Sobrevivente (Final Girl/Boy)", "O Atleta", "O Nerd", "A Vítima Popular", "O Policial da Cidade", "O Cético", "Monitor de Acampamento", "O Gótico", "Jornalista Investigativo", "Mecânico de Estrada", "Vagabundo Local", "O Jocker (Alívio Cômico)", "Ex-Militar"]
        };

        function iniciarMesa() {
            const estilo = document.getElementById('estilo').value;
            const num = document.getElementById('players').value;
            const container = document.getElementById('fichasContainer');
            
            document.getElementById('setup').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';

            let labelEspecial = "HABILIDADE";
            if(estilo === 'jjk') labelEspecial = "ENERGIA AMALDIÇOADA";
            if(estilo === 'jojo') labelEspecial = "NOME DO STAND";
            if(estilo === 'onepiece') labelEspecial = "AKUMA NO MI (FRUTA)";

            container.innerHTML = "";
            for(let i=1; i<=num; i++) {
                let clHtml = classesDB[estilo].map(c => `<option>${c}</option>`).join('');
                let f = document.createElement('div');
                f.className = "ficha";
                f.innerHTML = `
                    <div class="ficha-head">PLAYER #0${i} - ${estilo.toUpperCase()}</div>
                    <div class="campos">
                        <input type="text" placeholder="Nome">
                        <input type="text" placeholder="Idade">
                        <input type="text" placeholder="Altura">
                        <select>${clHtml}</select>
                        <input type="text" class="span2" placeholder="${labelEspecial}">
                    </div>
                `;
                container.appendChild(f);
            }
        }

        function rolar() {
            const res = document.getElementById('res');
            let i = 0;
            const anim = setInterval(() => {
                res.innerText = Math.floor(Math.random() * 20) + 1;
                i++;
                if(i > 10) {
                    clearInterval(anim);
                    let final = Math.floor(Math.random() * 20) + 1;
                    res.innerText = final;
                    res.style.color = (final == 20) ? "#00FF00" : (final == 1 ? "#E60000" : "var(--azul)");
                }
            }, 50);
        }
    </script>
</body>
</html>
