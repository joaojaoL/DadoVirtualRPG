<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG MASTER - MULTI-ANIME SYNC</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root { --red: #d90429; --dark: #0b090a; --card: #161a1d; --white: #f5f3f4; }
        * { border-radius: 0 !important; box-sizing: border-box; } 
        body { font-family: 'Roboto Mono', monospace; background: var(--dark); color: var(--white); margin: 0; padding-bottom: 50px; }
        .header { background: var(--red); padding: 15px; text-align: center; border-bottom: 6px solid #000; margin-bottom: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: var(--card); padding: 30px; border: 4px solid var(--red); box-shadow: 12px 12px 0px #000; }
        h2, h3 { font-family: 'Oswald'; text-transform: uppercase; border-bottom: 3px solid var(--red); padding-bottom: 5px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: var(--red); font-size: 0.8rem; text-transform: uppercase; }
        select, input, textarea { padding: 12px; margin: 8px 0; border: 3px solid #444; background: #000; color: #fff; width: 100%; font-family: 'Roboto Mono'; }
        button { background: var(--red); color: white; border: none; padding: 15px; width: 100%; font-family: 'Oswald'; font-size: 1.2rem; cursor: pointer; margin-top: 10px; box-shadow: 5px 5px 0px #000; text-transform: uppercase; }
        button:hover { background: #ef233c; transform: translate(-2px, -2px); box-shadow: 7px 7px 0px #000; }
        #rpg-panel { display: none; width: 95%; max-width: 1300px; margin: 0 auto; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 25px; }
        .card { background: var(--card); padding: 25px; border: 3px solid var(--red); box-shadow: 10px 10px 0px #000; }
        #chat-box { height: 350px; overflow-y: auto; border: 3px solid #222; background: #000; padding: 15px; font-size: 0.9rem; border-left: 6px solid var(--red); }
        .hp-item { background: #000; padding: 15px; border: 2px solid #333; margin-bottom: 15px; }
        .hp-bar-bg { height: 25px; background: #222; border: 2px solid #000; margin: 10px 0; }
        .hp-bar-fill { height: 100%; background: var(--red); transition: 0.5s; width: 100%; }
    </style>
</head>
<body>

    <div class="header"><h1>SISTEMA DE RPG TÁTICO</h1></div>

    <div id="step1" class="container">
        <h2>Configuração Geral</h2>
        <label>Tema da Campanha</label>
        <select id="rpg-style">
            <option value="jujutsu">Jujutsu Kaisen</option>
            <option value="onepiece">One Piece</option>
            <option value="jojo">JoJo's Bizarre Adventure</option>
            <option value="medieval">Fantasia Medieval</option>
            <option value="slasher">Terror Slasher</option>
        </select>
        <label>Duração Estimada</label>
        <select id="duration"></select>
        <label>Número de Jogadores</label>
        <input type="number" id="p-count" value="2" min="1">
        <button onclick="proximo()">Configurar Personagens</button>
    </div>

    <div id="step2" class="container" style="display:none;">
        <h2>Fichas dos Jogadores</h2>
        <div id="inputs-container"></div>
        <button onclick="iniciar()">Lançar Sessão</button>
    </div>

    <div id="rpg-panel">
        <div class="card">
            <h3>[STATUS DA EQUIPE]</h3>
            <div id="final-hp-list"></div>
            <div style="margin-top: 30px;">
                <h3>[NOTAS DO MESTRE]</h3>
                <textarea id="master-notes" style="height: 300px;" placeholder="Segredos da campanha..."></textarea>
            </div>
        </div>

        <div class="card">
            <h3>[CHAT EM TEMPO REAL]</h3>
            <div id="chat-box"></div>
            <div style="display:flex; gap:10px; margin-top:10px">
                <input type="text" id="chat-input" placeholder="Mensagem...">
                <button onclick="enviar()" style="margin:0; width:100px">OK</button>
            </div>
            <div style="margin-top: 20px;">
                <h3>[DADOS]</h3>
                <select id="dado-seletor">
                    <option value="2">D2</option><option value="6">D6</option><option value="20" selected>D20</option><option value="100">D100</option>
                </select>
                <div id="dice-result" style="font-size:3rem; text-align:center; color:var(--red); font-family:'Oswald'">--</div>
                <button onclick="rolar()">Rolar</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA3-yiNczMAF4sdZ9kog4ovXc75fciaN2g",
            authDomain: "meudadovirtualok.firebaseapp.com",
            projectId: "meudadovirtualok",
            storageBucket: "meudadovirtualok.firebasestorage.app",
            messagingSenderId: "696487273882",
            appId: "1:696487273882:web:342934592e10b0c66d8623",
            databaseURL: "https://meudadovirtualok-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const dur = document.getElementById('duration');
        for(let d=1; d<=30; d++) dur.innerHTML += `<option>${d} Dia(s)</option>`;
        for(let m=1; m<=5; m++) dur.innerHTML += `<option>${m} Mês(es)</option>`;

        const classData = {
            jujutsu: ["Feiticeiro Grau 4", "Feiticeiro Grau 3", "Feiticeiro Grau 2", "Feiticeiro Grau 1", "Especial", "Shikigami", "Mestre de Ferramentas", "Receptáculo", "Restrição Celestial", "Usuário de Maldição", "Doutor Reverso", "Invocador", "Prodigio"],
            onepiece: ["Lutador Akuma no Mi Logia", "Lutador Akuma no Mi Paramecia", "Lutador Akuma no Mi Zoan", "Espadachim 3 Espadas", "Espadachim de Fogo", "Atirador Sniper", "Ciborgue Mecânico", "Navegador Estrategista", "Cozinheiro de Combate", "Arqueólogo", "Músico de Stand", "Timoneiro", "Mestre de Haki"],
            jojo: ["Stand Curto Alcance", "Stand Longo Alcance", "Stand Automático", "Stand de Cura", "Stand de Colônia", "Stand Independente", "Mestre de Hamon", "Vampiro Diurno", "Usuário de Spin", "Ciborgue Alemão", "Stand de Precisão", "Stand de Força", "Lutador de Stand"],
            medieval: ["Guerreiro", "Mago", "Ladino", "Bárbaro", "Bardo", "Clérigo", "Druida", "Feiticeiro", "Monge", "Paladino", "Patrulheiro", "Arcanista", "Inventor"],
            slasher: ["O Atleta", "A Final Girl", "O Nerd", "A Popular", "O Rebelde", "O Xerife", "O Sobrevivencialista", "O Palhaço", "O Monitor", "O Estranho", "O Médio", "O Motorista", "O Investigador"]
        };

        function proximo() {
            const estilo = document.getElementById('rpg-style').value;
            const qtd = document.getElementById('p-count').value;
            const container = document.getElementById('inputs-container');
            container.innerHTML = '';
            const classes = classData[estilo];
            
            for(let i=0; i<qtd; i++) {
                let options = classes.map(c => `<option>${c}</option>`).join('');
                container.innerHTML += `
                    <div style="margin-bottom: 15px; border: 2px solid #444; padding: 15px;">
                        <input type="text" class="p-nome" placeholder="Nome do Personagem">
                        <select class="p-classe">${options}</select>
                        <input type="number" class="p-hp" value="100">
                    </div>`;
            }
            document.getElementById('step1').style.display='none';
            document.getElementById('step2').style.display='block';
        }

        function iniciar() {
            const nomes = document.querySelectorAll('.p-nome');
            const cls = document.querySelectorAll('.p-classe');
            const hps = document.querySelectorAll('.p-hp');
            players = [];
            nomes.forEach((n, i) => {
                let v = parseInt(hps[i].value) || 100;
                players.push({ nome: n.value || `Player ${i+1}`, classe: cls[i].value, hp: v, max: v });
            });
            document.getElementById('step2').style.display='none';
            document.getElementById('rpg-panel').style.display='grid';
            render();
            ouvir();
        }

        function render() {
            const lista = document.getElementById('final-hp-list');
            lista.innerHTML = '';
            players.forEach((p, i) => {
                lista.innerHTML += `
                    <div class="hp-item">
                        <b>${p.nome}</b> (${p.classe})<br>
                        <div class="hp-bar-bg"><div id="bar-${i}" class="hp-bar-fill" style="width:${(p.hp/p.max)*100}%"></div></div>
                        <button onclick="dano(${i},-10)">-10 HP</button> <button onclick="dano(${i},10)" style="background:#1b4332">+10 HP</button>
                    </div>`;
            });
        }

        function dano(i, v) { players[i].hp = Math.max(0, Math.min(players[i].max, players[i].hp + v)); render(); }
        function enviar() { const msg = document.getElementById('chat-input'); if(msg.value) { db.ref('chat').push({ user: 'Mestre', text: msg.value }); msg.value = ''; } }
        function rolar() { const d = document.getElementById('dado-seletor').value; const res = Math.floor(Math.random() * d) + 1; document.getElementById('dice-result').innerText = res; db.ref('chat').push({ user: 'DADO', text: `D${d}: [ ${res} ]` }); }
        
        function ouvir() {
            db.ref('chat').on('value', (snap) => {
                const box = document.getElementById('chat-box'); box.innerHTML = '';
                snap.forEach((child) => { const m = child.val(); box.innerHTML += `<div style="margin-bottom:5px"><b>${m.user}:</b> ${m.text}</div>`; });
                box.scrollTop = box.scrollHeight;
            });
        }
    </script>
</body>
</html>
