<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Master - Tactical Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --red: #d90429; --dark: #0b090a; --card: #161a1d; 
            --white: #f5f3f4; --border: #444; --accent: #ef233c;
        }

        body { 
            font-family: 'Roboto Mono', monospace; background: var(--dark); 
            color: var(--white); margin: 0; display: flex; flex-direction: column; align-items: center; 
        }
        
        .header { 
            background: var(--red); width: 100%; padding: 20px 0; 
            text-align: center; border-bottom: 5px solid #000; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .container { 
            max-width: 700px; width: 90%; background: var(--card); 
            padding: 30px; border: 3px solid var(--red); margin: 40px 20px; box-shadow: 10px 10px 0px #000;
        }

        #rpg-panel { display: none; width: 98%; max-width: 1200px; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: var(--card); padding: 20px; border: 2px solid var(--red); box-shadow: 6px 6px 0px #000; }

        input, select, textarea { 
            padding: 12px; margin: 8px 0; border: 2px solid var(--border); 
            background: #000; color: #fff; width: 100%; box-sizing: border-box; 
        }

        button { 
            background: var(--red); color: white; border: none; padding: 15px; 
            font-family: 'Oswald'; text-transform: uppercase; cursor: pointer; transition: 0.2s;
        }
        button:hover { background: var(--accent); transform: scale(1.02); }

        /* DADO */
        .dice-box { 
            width: 140px; height: 140px; background-size: contain; background-repeat: no-repeat;
            background-position: center; margin: 15px auto; display: flex; 
            align-items: center; justify-content: center; font-size: 2.5rem; font-family: 'Oswald';
            text-shadow: 0 0 10px #000;
        }

        /* CHAT POPUP */
        #chat-btn { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 50%; z-index: 999; font-weight: bold; }
        #chat-popup { 
            display: none; position: fixed; bottom: 90px; right: 20px; width: 320px; height: 450px; 
            background: var(--card); border: 3px solid var(--red); flex-direction: column; z-index: 1000;
        }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; background: #000; font-size: 0.8rem; }
        .msg { margin-bottom: 8px; border-bottom: 1px solid #222; }
        .msg b { color: var(--red); }

        .hp-bar-bg { height: 20px; background: #222; border: 1px solid #000; margin: 10px 0; }
        .hp-bar-fill { height: 100%; background: var(--red); transition: 0.3s; }
    </style>
</head>
<body>

    <div class="header"><h1>Painel do Mestre + Chat</h1></div>

    <button id="chat-btn" onclick="toggleChat()">CHAT</button>

    <div id="chat-popup">
        <div style="background:var(--red); padding:8px; font-family:'Oswald'; display:flex; justify-content:space-between">
            <span>SALA DE CHAT</span>
            <button onclick="toggleChat()" style="background:none; padding:0; width:20px; border:none">X</button>
        </div>
        <div id="chat-messages">Conectando...</div>
        <div style="padding:10px; border-top:1px solid var(--red)">
            <input type="text" id="chat-user" placeholder="Seu Nome" style="padding:5px; font-size:11px">
            <div style="display:flex; gap:5px">
                <input type="text" id="chat-msg" placeholder="Fala..." style="padding:5px">
                <button id="send-chat" style="padding:5px 10px; font-size:12px">OK</button>
            </div>
        </div>
    </div>

    <div id="step1" class="container">
        <h2>Nova Sessão</h2>
        <label>ESTILO</label>
        <select id="rpg-style">
            <option value="medieval">Medieval</option>
            <option value="jujutsu">Jujutsu Kaisen</option>
            <option value="paranormal">Paranormal</option>
        </select>
        <label>JOGADORES</label>
        <input type="number" id="p-count" value="2">
        <button onclick="proximoPasso()">Configurar Fichas</button>
    </div>

    <div id="step2" class="container" style="display:none">
        <h2>Fichas</h2>
        <div id="inputs-container"></div>
        <button onclick="confirmarFichas()">Iniciar Jogo</button>
    </div>

    <div id="rpg-panel">
        <div class="card">
            <h3>STATUS DO GRUPO</h3>
            <div id="final-hp-list"></div>
            <button onclick="reiniciarTudo()" style="background:#333; font-size:10px">REINICIAR TUDO</button>
        </div>

        <div class="card">
            <h3>DADOS</h3>
            <select id="dado-seletor" onchange="atualizarImagemDado()">
                <option value="2">D2</option>
                <option value="4">D4</option>
                <option value="6">D6</option>
                <option value="8">D8</option>
                <option value="9">D9</option>
                <option value="20" selected>D20</option>
            </select>
            <div id="dice-result" class="dice-box">--</div>
            <button onclick="jogarDado()" style="width:100%">ROLAR</button>
            <textarea id="master-notes" rows="6" placeholder="Notas..." oninput="salvarProgresso()" style="margin-top:20px"></textarea>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onChildAdded, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA3-yiNczMAF4sdZ9kog4ovXc75fciaN2g",
            authDomain: "meudadovirtualok.firebaseapp.com",
            databaseURL: "https://meudadovirtualok-default-rtdb.firebaseio.com",
            projectId: "meudadovirtualok",
            storageBucket: "meudadovirtualok.firebasestorage.app",
            messagingSenderId: "696487273882",
            appId: "1:696487273882:web:342934592e10b0c66d8623"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, "chat");

        // Funções Globais (Para os botões funcionarem)
        window.toggleChat = () => {
            const p = document.getElementById('chat-popup');
            p.style.display = (p.style.display === 'flex') ? 'none' : 'flex';
        };

        document.getElementById('send-chat').onclick = () => {
            const u = document.getElementById('chat-user').value || "Mestre";
            const m = document.getElementById('chat-msg').value;
            if(m.trim()) {
                push(chatRef, { user: u, text: m, time: Date.now() });
                document.getElementById('chat-msg').value = "";
            }
        };

        const chatBox = document.getElementById('chat-messages');
        onChildAdded(query(chatRef, limitToLast(30)), (snap) => {
            if(chatBox.innerText === "Conectando...") chatBox.innerText = "";
            const d = snap.val();
            chatBox.innerHTML += `<div class="msg"><b>${d.user}:</b> ${d.text}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        // --- SISTEMA RPG ---
        let finalOrder = [];

        window.proximoPasso = () => {
            const qtd = document.getElementById('p-count').value;
            const container = document.getElementById('inputs-container');
            container.innerHTML = '';
            for(let i=0; i<qtd; i++) {
                container.innerHTML += `<input type="text" placeholder="Nome Personagem" class="in-nome">`;
            }
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
        };

        window.confirmarFichas = () => {
            document.querySelectorAll('.in-nome').forEach(n => {
                finalOrder.push({ nome: n.value || "Herói", hp: 100, maxHp: 100 });
            });
            document.getElementById('step2').style.display = 'none';
            document.getElementById('rpg-panel').style.display = 'grid';
            carregarPainel();
            salvarProgresso();
        };

        window.carregarPainel = () => {
            const list = document.getElementById('final-hp-list');
            list.innerHTML = '';
            finalOrder.forEach((p, i) => {
                list.innerHTML += `
                    <div style="margin-bottom:15px">
                        <span>${p.nome}</span>
                        <div class="hp-bar-bg"><div id="hp-f-${i}" class="hp-bar-fill" style="width:${(p.hp/p.maxHp)*100}%"></div></div>
                        <button onclick="mudarVida(${i}, -5)">-5</button> <button onclick="mudarVida(${i}, 5)">+5</button>
                    </div>`;
            });
        };

        window.mudarVida = (i, v) => {
            finalOrder[i].hp = Math.max(0, Math.min(finalOrder[i].maxHp, finalOrder[i].hp + v));
            carregarPainel();
            salvarProgresso();
        };

        window.atualizarImagemDado = () => {
            const l = document.getElementById('dado-seletor').value;
            const res = document.getElementById('dice-result');
            if(l === "9") res.style.backgroundImage = "url('dado9.png')";
            else if(l === "2" || l === "4") res.style.backgroundImage = "url('dado2.png')";
            else if(l === "6" || l === "8") res.style.backgroundImage = "url('dado8.png')";
            else res.style.backgroundImage = "url('dado.png')";
        };

        window.jogarDado = () => {
            const l = document.getElementById('dado-seletor').value;
            const res = document.getElementById('dice-result');
            res.innerText = "...";
            setTimeout(() => { res.innerText = Math.floor(Math.random() * l) + 1; }, 400);
        };

        window.salvarProgresso = () => {
            localStorage.setItem('rpg_save', JSON.stringify({f: finalOrder, n: document.getElementById('master-notes').value}));
        };

        window.reiniciarTudo = () => { if(confirm("Apagar tudo?")) { localStorage.clear(); location.reload(); }};

        // Auto-load
        const salvo = localStorage.getItem('rpg_save');
        if(salvo) {
            const d = JSON.parse(salvo);
            finalOrder = d.f;
            document.getElementById('step1').style.display = 'none';
            document.getElementById('rpg-panel').style.display = 'grid';
            document.getElementById('master-notes').value = d.n;
            carregarPainel();
        }
        atualizarImagemDado();
    </script>
</body>
</html>
