<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Master - Cloud System</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root { --red: #d90429; --dark: #0b090a; --card: #161a1d; --white: #f5f3f4; --border: #444; }
        * { border-radius: 0 !important; } /* Interface Quadrada */

        body { font-family: 'Roboto Mono', monospace; background: var(--dark); color: var(--white); margin: 0; display: flex; flex-direction: column; align-items: center; }
        .header { background: var(--red); width: 100%; padding: 20px 0; text-align: center; border-bottom: 5px solid #000; }
        .container { max-width: 750px; width: 90%; background: var(--card); padding: 30px; border: 3px solid var(--red); margin: 40px 20px; box-shadow: 10px 10px 0px #000; }
        h2, h3 { font-family: 'Oswald'; text-transform: uppercase; border-bottom: 2px solid var(--red); padding-bottom: 5px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: var(--red); font-size: 0.8rem; }
        select, input, textarea { padding: 12px; margin: 8px 0; border: 2px solid var(--border); background: #000; color: #fff; width: 100%; box-sizing: border-box; }
        button { background: var(--red); color: white; border: none; padding: 15px; width: 100%; font-family: 'Oswald'; font-size: 1.1rem; text-transform: uppercase; cursor: pointer; margin-top: 10px; box-shadow: 4px 4px 0px #000; }

        #rpg-panel { display: none; width: 95%; max-width: 1300px; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: var(--card); padding: 20px; border: 2px solid var(--red); box-shadow: 8px 8px 0px #000; }

        #chat-box { height: 300px; overflow-y: auto; border: 2px solid #333; background: #000; padding: 10px; font-size: 0.85rem; margin-bottom: 10px; border-left: 5px solid var(--red); }
        .msg { margin-bottom: 8px; border-bottom: 1px solid #222; padding-bottom: 4px; }
        .hp-bar-bg { height: 20px; background: #222; border: 1px solid #000; margin: 5px 0; }
        .hp-bar-fill { height: 100%; background: var(--red); width: 100%; transition: 0.4s; }
        .dice-box { width: 80px; height: 80px; border: 3px solid var(--red); margin: 10px auto; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-family: 'Oswald'; background: #000; }
    </style>
</head>
<body>

    <div class="header"><h1>Painel Master - Cloud Sync</h1></div>

    <div id="step1" class="container">
        <h2>Configuração da Sessão</h2>
        <label>Duração da Campanha</label>
        <select id="duration"></select>
        <label>Quantidade de Jogadores</label>
        <input type="number" id="p-count" value="2">
        <button onclick="proximoPasso()">Configurar Jogadores</button>
    </div>

    <div id="step2" class="container" style="display:none;">
        <h2>Fichas & HP Inicial</h2>
        <div id="inputs-container"></div>
        <button onclick="confirmarFichas()">Iniciar Sistema Sincronizado</button>
    </div>

    <div id="rpg-panel">
        <div class="card">
            <h3>[STATUS DOS JOGADORES]</h3>
            <div id="final-hp-list"></div>
            
            <div style="margin-top: 20px;">
                <h3>[NOTAS DO MESTRE]</h3>
                <textarea id="master-notes" style="height: 250px;" placeholder="Anote aqui a história e itens..."></textarea>
            </div>
        </div>

        <div class="card">
            <h3>[CHAT EM TEMPO REAL]</h3>
            <div id="chat-box"></div>
            <div style="display:flex; gap:5px">
                <input type="text" id="chat-input" placeholder="Enviar mensagem...">
                <button onclick="enviarMensagem()" style="margin:0; width:80px">OK</button>
            </div>

            <div style="margin-top: 20px;">
                <h3>[SISTEMA DE DADOS]</h3>
                <select id="dado-seletor">
                    <option value="2">D2</option><option value="4">D4</option>
                    <option value="6">D6</option><option value="8">D8</option>
                    <option value="15">D15</option><option value="20" selected>D20</option>
                </select>
                <div id="dice-result" class="dice-box">--</div>
                <button onclick="jogarDado()">Rolar</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO DO SEU NOVO PROJETO (meudadovirtualok)
        const firebaseConfig = {
            apiKey: "AIzaSyA3-yiNczMAF4sdZ9kog4ovXc75fciaN2g",
            authDomain: "meudadovirtualok.firebaseapp.com",
            projectId: "meudadovirtualok",
            storageBucket: "meudadovirtualok.firebasestorage.app",
            messagingSenderId: "696487273882",
            appId: "1:305103444648:web:75865e94be71676d6ec555",
            databaseURL: "https://meudadovirtualok-default-rtdb.firebaseio.com/"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Duração 1 dia a 5 meses sem pular
        const durSel = document.getElementById('duration');
        for(let d=1; d<=30; d++) durSel.innerHTML += `<option value="${d} dias">${d} Dia(s)</option>`;
        for(let m=1; m<=5; m++) durSel.innerHTML += `<option value="${m} meses">${m} Mês(es)</option>`;

        let players = [];

        function proximoPasso() {
            const qtd = document.getElementById('p-count').value;
            const area = document.getElementById('inputs-container');
            area.innerHTML = '';
            for(let i=0; i<qtd; i++) {
                area.innerHTML += `
                    <div style="border: 1px solid #555; padding: 10px; margin-bottom: 10px; background: #1a1a1a;">
                        <input type="text" class="in-nome" placeholder="Nome do Personagem">
                        <input type="number" class="in-hp" placeholder="HP Inicial" value="100">
                    </div>`;
            }
            document.getElementById('step1').style.display='none';
            document.getElementById('step2').style.display='block';
        }

        function confirmarFichas() {
            const nomes = document.querySelectorAll('.in-nome');
            const hps = document.querySelectorAll('.in-hp');
            players = [];
            nomes.forEach((n, i) => {
                let v = parseInt(hps[i].value) || 100;
                players.push({ nome: n.value || `Player ${i+1}`, hp: v, maxHp: v });
            });
            document.getElementById('step2').style.display='none';
            document.getElementById('rpg-panel').style.display='grid';
            renderizarPainel();
            ouvirChat();
        }

        function renderizarPainel() {
            const list = document.getElementById('final-hp-list');
            list.innerHTML = '';
            players.forEach((p, i) => {
                list.innerHTML += `
                    <div style="margin-bottom: 10px; background:#000; padding:10px; border: 1px solid #333">
                        <b>${p.nome}</b> <span id="val-hp-${i}">${p.hp}/${p.maxHp}</span>
                        <div class="hp-bar-bg"><div id="fill-${i}" class="hp-bar-fill"></div></div>
                        <div style="display:flex; gap:5px">
                            <button onclick="mudarVida(${i},-10)" style="margin:0; padding:5px; font-size:0.75rem">-10 HP</button>
                            <button onclick="mudarVida(${i},10)" style="margin:0; padding:5px; font-size:0.75rem; background:#1b4332">+10 HP</button>
                        </div>
                    </div>`;
            });
        }

        function mudarVida(idx, v) {
            players[idx].hp = Math.max(0, Math.min(players[idx].maxHp, players[idx].hp + v));
            const pct = (players[idx].hp / players[idx].maxHp) * 100;
            document.getElementById(`fill-${idx}`).style.width = pct + "%";
            document.getElementById(`val-hp-${idx}`).innerText = `${players[idx].hp}/${players[idx].maxHp}`;
        }

        function enviarMensagem() {
            const input = document.getElementById('chat-input');
            if(!input.value) return;
            database.ref('chat').push({ user: "Mestre", text: input.value });
            input.value = '';
        }

        function jogarDado() {
            const d = document.getElementById('dado-seletor').value;
            const res = Math.floor(Math.random() * d) + 1;
            document.getElementById('dice-result').innerText = res;
            database.ref('chat').push({ user: "DADO", text: `Rolou D${d} e tirou: ${res}` });
        }

        function ouvirChat() {
            database.ref('chat').limitToLast(15).on('child_added', (snap) => {
                const m = snap.val();
                const box = document.getElementById('chat-box');
                box.innerHTML += `<div class="msg"><b style="color:var(--red)">${m.user}:</b> ${m.text}</div>`;
                box.scrollTop = box.scrollHeight;
            });
        }
    </script>
</body>
</html>
