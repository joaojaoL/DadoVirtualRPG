<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Dados e Fichas Profissional</title>
    <style>
        :root {
            --vermelho-topo: #d32f2f;
            --preto-rpg: #000000;
            --cinza-fundo: #f4f4f4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #ffffff;
            color: #333;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* HEADER INSPIRADO NO PRINT */
        header {
            background-color: var(--vermelho-topo);
            width: 100%;
            padding: 30px 15px;
            text-align: center;
            color: white;
        }

        header h1 { font-size: 2rem; margin-bottom: 5px; text-transform: uppercase; }

        /* BARRA DE CONFIGURAÇÃO */
        .config-bar {
            width: 100%;
            background: #eee;
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            border-bottom: 1px solid #ccc;
        }

        .campo { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 14px; }

        select, input {
            padding: 6px;
            border: 1px solid #999;
            border-radius: 3px;
        }

        /* ÁREA DO DADO CENTRALIZADO */
        #zona-jogo { display: none; width: 100%; max-width: 1100px; text-align: center; padding: 20px; }

        .dice-wrapper {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 30px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        #dadoImg {
            width: 100%;
            position: absolute;
            z-index: 1;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.2));
        }

        #resultado {
            position: relative;
            z-index: 2;
            color: white;
            font-size: 3.2rem;
            font-weight: 900;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
            margin-top: 5px; /* Alinhamento central no triângulo */
        }

        .btn-lancar {
            background: #e0e0e0;
            border: 1px solid #bbb;
            padding: 10px 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* GRID DE FICHAS - PRETO E VERMELHO */
        .fichas-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .ficha-card {
            background: var(--preto-rpg);
            color: white;
            border-left: 5px solid var(--vermelho-topo);
            padding: 15px;
            text-align: left;
        }

        .ficha-card h3 {
            color: var(--vermelho-topo);
            font-size: 0.8rem;
            border-bottom: 1px solid #333;
            margin-bottom: 10px;
            padding-bottom: 5px;
        }

        .inputs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .inputs-grid input, .inputs-grid select {
            background: #111;
            border: 1px solid #444;
            color: #fff;
            font-size: 12px;
            padding: 8px;
        }

        .full { grid-column: span 2; }

        @media (max-width: 600px) {
            .config-bar { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Gerador de dados online</h1>
        <p>Dados customizados para RPG</p>
    </header>

    <div class="config-bar" id="formSetup">
        <div class="campo">
            Estilo:
            <select id="estilo">
                <option value="paranormal">Paranormal</option>
                <option value="jojo">JoJo's Bizarre</option>
                <option value="onepiece">One Piece</option>
                <option value="jjk">Jujutsu Kaisen</option>
                <option value="slasher">Slasher</option>
                <option value="medieval">Medieval</option>
                <option value="faroeste">Faroeste</option>
                <option value="casa">Casa Amaldiçoada</option>
            </select>
        </div>
        <div class="campo">
            Dado:
            <select id="tipoDado">
                <option value="2">D2</option>
                <option value="4">D4</option>
                <option value="6">D6</option>
                <option value="8">D8</option>
                <option value="10">D10</option>
                <option value="15">D15</option>
                <option value="20" selected>D20</option>
            </select>
        </div>
        <div class="campo">
            Jogadores:
            <input type="number" id="qtd" min="1" max="15" value="1" style="width: 50px;">
        </div>
        <div class="campo">
            One Shot?
            <select id="oneshot">
                <option>SIM</option>
                <option>NÃO</option>
            </select>
        </div>
        <button onclick="gerar()" style="padding: 5px 15px; cursor: pointer;">CONFIRMAR</button>
    </div>

    <div id="zona-jogo">
        <div class="dice-wrapper" onclick="rolar()">
            <img src="dado.png" id="dadoImg" alt="DADO">
            <div id="resultado">--</div>
        </div>
        <button class="btn-lancar" onclick="rolar()">Lançar</button>

        <div class="fichas-container" id="fichas"></div>
    </div>

    <script>
        const dbClasses = {
            paranormal: ["Exorcista", "Médium", "Detetive Espiritual", "Caçador de Monstros", "Ocultista", "Inquisidor", "Cientista Paranormal", "Possuído", "Ceifador", "Vidente", "Relicário Vivo", "Necromante", "Andarilho"],
            jojo: ["Stand Curto Alcance", "Stand Longo Alcance", "Stand Automático", "Stand de Cura", "Stand de Reconhecimento", "Stand de Tempo", "Stand de Espaço", "Usuário de Hamon", "Vampiro", "Ciborgue", "Mestre do Spin", "Stand Fenômeno", "Usuário de Objeto"],
            onepiece: ["Espadachim", "Atirador", "Cozinheiro", "Médico", "Navegador", "Arqueólogo", "Carpinteiro", "Músico", "Lutador Tritão", "Mink Guerreiro", "Cientista", "Timoneiro", "Gigante"],
            jjk: ["Feiticeiro de Grau Especial", "Feiticeiro Grau 1", "Usuário de Shikigami", "Restrição Celestial (Física)", "Restrição Celestial (Energia)", "Manipulador de Sangue", "Mestre de Barreiras", "Discurso Amaldiçoado", "Técnica de Projeção", "Usuário de Ferramentas", "Vaso de Maldição", "Mestre de Taijutsu", "Médico (Reversa)"],
            slasher: ["Sobrevivente", "Atleta", "Nerd", "Vítima Popular", "Policial", "Cético", "Monitor", "Gótico", "Jornalista", "Mecânico", "Vagabundo", "Joker", "Ex-Militar"],
            medieval: ["Guerreiro", "Mago", "Ladino", "Clérigo", "Paladino", "Bárbaro", "Arqueiro", "Druida", "Bardo", "Monge", "Bruxo", "Feiticeiro", "Cavaleiro"],
            faroeste: ["Pistoleiro", "Xerife", "Bandido", "Caçador de Recompensas", "Garimpeiro", "Médico de Fronteira", "Pianista de Saloon", "Batedor", "Foragido", "Pregador", "Vigarista", "Explorador", "Cavaleiro Errante"],
            casa: ["Herdeiro Relutante", "Investigador Paranormal", "Criança Sensitiva", "Médium", "Historiador", "Cético Forçado", "Zelador da Mansão", "Espírito Preso", "Sobrevivente do Passado", "Bibliotecário Oculto", "Vítima da Maldição", "Doutor em Ocultismo", "Arquiteto da Loucura"]
        };

        function gerar() {
            const estilo = document.getElementById('estilo').value;
            const players = document.getElementById('qtd').value;
            const container = document.getElementById('fichas');
            
            document.getElementById('formSetup').style.display = 'none';
            document.getElementById('zona-jogo').style.display = 'block';

            let campoEsp = "Habilidade";
            if(estilo === 'jjk') campoEsp = "Energia Amaldiçoada";
            if(estilo === 'jojo') campoEsp = "Nome do Stand";
            if(estilo === 'onepiece') campoEsp = "Fruta (Akuma no Mi)";

            container.innerHTML = "";
            for(let i=1; i<=players; i++) {
                let cl = dbClasses[estilo].map(c => `<option>${c}</option>`).join('');
                container.innerHTML += `
                    <div class="ficha-card">
                        <h3>PLAYER #0${i} | ${estilo.toUpperCase()}</h3>
                        <div class="inputs-grid">
                            <input type="text" placeholder="Nome">
                            <input type="text" placeholder="Idade">
                            <input type="text" placeholder="Altura">
                            <select>${cl}</select>
                            <input type="text" class="full" placeholder="${campoEsp}">
                        </div>
                    </div>
                `;
            }
        }

        function rolar() {
            const res = document.getElementById('resultado');
            const faces = parseInt(document.getElementById('tipoDado').value);
            let tempo = 0;
            const interval = setInterval(() => {
                res.innerText = Math.floor(Math.random() * faces) + 1;
                tempo++;
                if(tempo > 15) {
                    clearInterval(interval);
                    res.innerText = Math.floor(Math.random() * faces) + 1;
                    res.style.color = (res.innerText == faces) ? "#ffff00" : "white";
                }
            }, 45);
        }
    </script>
</body>
</html>
