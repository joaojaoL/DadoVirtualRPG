<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Roleta do Mestre e Calculadora</title>
    <style>
        /* --- Estilo da Roleta --- */
        #container-roleta {
            position: relative;
            width: 300px;
            margin: 50px auto;
            text-align: center;
        }
        #canvas-roleta {
            border-radius: 50%;
            transition: transform 3s cubic-bezier(0.1, 0, 0.2, 1); /* 3 segundos de giro */
        }
        #btn-girar {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60px; height: 60px;
            background: white;
            border-radius: 50%;
            border: 4px solid #333;
            cursor: pointer;
            z-index: 10;
            font-weight: bold;
        }

        /* --- Estilo da Calculadora (Pop-up) --- */
        #calc-link { color: blue; cursor: pointer; text-decoration: underline; }
        #modal-calc {
            display: none; /* Escondido por padrão */
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #f4f4f4;
            padding: 20px;
            border: 2px solid #333;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            z-index: 100;
        }
        #modal-calc .close-btn {
            float: right;
            cursor: pointer;
            font-weight: bold;
            color: red;
        }
    </style>
</head>
<body>

    <p id="calc-link" onclick="toggleCalc(true)">Calculadora</p>

    <div id="container-roleta">
        <canvas id="canvas-roleta" width="300" height="300"></canvas>
        <button id="btn-girar" onclick="girarRoleta()">GIRAR</button>
    </div>

    <div id="modal-calc">
        <span class="close-btn" onclick="toggleCalc(false)">X</span>
        <h3>Calculadora</h3>
        <input type="text" id="display" readonly style="width: 100%; margin-bottom: 10px; text-align: right;">
        <br>
        <button onclick="addNum('7')">7</button> <button onclick="addNum('8')">8</button> <button onclick="addNum('9')">9</button> <button onclick="addNum('/')">/</button><br>
        <button onclick="addNum('4')">4</button> <button onclick="addNum('5')">5</button> <button onclick="addNum('6')">6</button> <button onclick="addNum('*')">*</button><br>
        <button onclick="addNum('1')">1</button> <button onclick="addNum('2')">2</button> <button onclick="addNum('3')">3</button> <button onclick="addNum('-')">-</button><br>
        <button onclick="addNum('0')">0</button> <button onclick="limpar()">C</button> <button onclick="calcular()">=</button> <button onclick="addNum('+')">+</button>
    </div>

    <script>
        // --- Lógica da Roleta ---
        const canvas = document.getElementById('canvas-roleta');
        const ctx = canvas.getContext('2d');
        // O "Mestre" pode alterar este Array com o que quiser
        const opcoes = ["Opção A", "Opção B", "Opção C", "Opção D", "Opção E", "Opção F"];
        const cores = ["#ff4545", "#ff8c00", "#ffd700", "#4caf50", "#1e90ff", "#8a2be2"];

        function desenharRoleta() {
            const sliceAngle = (2 * Math.PI) / opcoes.length;
            opcoes.forEach((texto, i) => {
                ctx.beginPath();
                ctx.fillStyle = cores[i % cores.length];
                ctx.moveTo(150, 150);
                ctx.arc(150, 150, 150, i * sliceAngle, (i + 1) * sliceAngle);
                ctx.fill();
                // Texto
                ctx.save();
                ctx.translate(150, 150);
                ctx.rotate(i * sliceAngle + sliceAngle / 2);
                ctx.fillStyle = "white";
                ctx.font = "bold 14px Arial";
                ctx.fillText(texto, 60, 5);
                ctx.restore();
            });
        }

        let grausAtuais = 0;
        function girarRoleta() {
            const extraGiro = Math.floor(Math.random() * 360) + 1440; // No mínimo 4 voltas + aleatório
            grausAtuais += extraGiro;
            canvas.style.transform = `rotate(${grausAtuais}deg)`;
        }

        // --- Lógica da Calculadora ---
        function toggleCalc(show) {
            document.getElementById('modal-calc').style.display = show ? 'block' : 'none';
        }

        function addNum(val) { document.getElementById('display').value += val; }
        function limpar() { document.getElementById('display').value = ''; }
        function calcular() {
            try {
                document.getElementById('display').value = eval(document.getElementById('display').value);
            } catch {
                alert("Conta inválida");
            }
        }

        desenharRoleta();
    </script>
</body>
</html>
