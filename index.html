<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Master - Painel Completo</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0f;
            --card: #1a1a20;
            --accent: #bc13fe;
            --gold: #ffb703;
            --text: #ffffff;
            --green: #38b000;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .setup-screen {
            max-width: 500px; width: 100%;
            background: var(--card);
            padding: 30px; border-radius: 15px;
            border: 2px solid var(--accent);
            text-align: center;
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.3);
        }

        h1, h2, h3 { font-family: 'MedievalSharp'; color: var(--gold); }

        input, button, textarea {
            padding: 12px; margin: 5px;
            border-radius: 8px; border: none;
            font-size: 1rem;
        }

        input, textarea { background: #2a2a35; color: white; border: 1px solid #444; width: 85%; }
        
        button { 
            background: var(--accent); color: white; 
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        
        button:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* ROLETA ESTILIZADA */
        .wheel-wrap {
            position: relative; width: 180px; height: 180px;
            margin: 15px auto; border-radius: 50%;
            border: 6px solid var(--gold);
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, #333, #1a1a20);
            transition: transform 3s cubic-bezier(0.1, 0, 0.2, 1);
        }

        .wheel-wrap::after {
            content: '▼'; position: absolute; top: -20px; 
            color: var(--gold); font-size: 20px; left: 50%; transform: translateX(-50%);
        }

        /* PAINEL PRINCIPAL */
        #rpg-panel {
            display: none; width: 100%; max-width: 1100px;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px;
        }

        .card { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid #333; text-align: center; }
        
        /* DADO */
        .dice-container {
            position: relative; width: 150px; height: 150px;
            margin: 0 auto 15px; display: flex; align-items: center; justify-content: center;
        }

        #dice-image { width: 100%; height: 100%; object-fit: contain; }

        #dice-result {
            position: absolute; top: 52%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem; font-family: 'MedievalSharp';
            color: #fff; text-shadow: 2px 2px 4px #000; pointer-events: none;
        }

        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0% { transform: translate(2px, 1px); }
            50% { transform: translate(-3px, 2px); }
            100% { transform: translate(0,0); }
        }

        .order-item { color: #4cc9f0; font-weight: bold; padding: 8px; border-bottom: 1px solid #333; text-align: left;}
    </style>
</head>
<body>

    <div id="setup-step-1" class="setup-screen">
        <h1>⚔️ Preparar Mesa</h1>
        <p>Quantos jogadores?</p>
        <input type="number" id="player-count" min="1" value="3">
        <button onclick="goToNames()">Próximo</button>
    </div>

    <div id="setup-step-2" class="setup-screen" style="display:none;">
        <h2>Nomes dos Heróis</h2>
        <div id="name-inputs"></div>
        <button onclick="prepareWheel()" style="background: var(--green);">Confirmar Grupo</button>
        
        <div id="roulette-area" style="display:none;">
            <div class="wheel-wrap" id="init-wheel"><div id="winner-text" style="font-family: 'MedievalSharp';">?</div></div>
            <p id="status-msg"></p>
            <button id="spin-btn" onclick="spinPlayer()">Sortear Próxima Iniciativa</button>
        </div>
    </div>

    <div id="rpg-panel">
        
        <div class="card">
            <h2>📜 Turnos</h2>
            <div id="final-order-list"></div>
