<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Master - Tactical Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --red: #d90429; 
            --dark: #0b090a; 
            --card: #161a1d; 
            --white: #f5f3f4; 
            --border: #444;
            --accent: #ef233c;
        }

        body { 
            font-family: 'Roboto Mono', monospace; 
            background: var(--dark); 
            color: var(--white); 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; 
        }
        
        .header { 
            background: var(--red); 
            width: 100%; padding: 25px 0; 
            text-align: center; border-bottom: 5px solid #000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .header h1 { margin: 0; font-family: 'Oswald'; text-transform: uppercase; letter-spacing: 2px; }

        .container { 
            max-width: 700px; width: 90%; 
            background: var(--card); 
            padding: 35px; 
            border: 3px solid var(--red); 
            margin: 40px 20px; 
            box-shadow: 12px 12px 0px #000;
        }

        h2 { font-family: 'Oswald'; text-transform: uppercase; border-bottom: 2px solid var(--red); padding-bottom: 10px; margin-bottom: 20px; color: #fff; }
        
        label { display: block; margin-top: 15px; font-weight: bold; color: var(--red); text-align: left; font-size: 0.85rem; letter-spacing: 1px; }
        
        select, input, textarea { 
            padding: 14px; margin: 8px 0; 
            border: 2px solid var(--border); 
            background: #000; color: #fff; 
            width: 100%; box-sizing: border-box; 
            border-radius: 0; outline: none;
        }
        select:focus, input:focus { border-color: var(--red); }

        button { 
            background: var(--red); 
            color: white; border: none; 
            padding: 18px; width: 100%; 
            font-family: 'Oswald'; font-size: 1.2rem; 
            text-transform: uppercase; cursor: pointer; 
            margin-top: 25px; display: block;
            box-shadow: 4px 4px 0px #800000;
            transition: 0.2s;
        }
        button:hover { background: var(--accent); transform: translate(-2px, -2px); box-shadow: 6px 6px 0px #000; }

        .player-card-input { 
            border: 2px solid #555; 
            background: #1e1e1e;
            padding: 20px; margin-bottom: 25px; 
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
        }

        #rpg-panel { display: none; width: 98%; max-width: 1300px; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; padding: 25px; }
        .card { background: var(--card); padding: 25px; border: 2px solid var(--red); box-shadow: 8px 8px 0px #000; }

        .hp-bar-bg { height: 30px; background: #222; border: 2px solid #000; position: relative; margin: 10px 0; }
        .hp-bar-fill { height: 100%; background: var(--red); width: 100%; transition: 0.4s ease; }

        .dice-box { 
            width: 160px; height: 160px; 
            background-image: url('dado.png'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            margin: 20px auto; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 2.8rem; 
            font-family: 'Oswald'; 
            color: #fff; 
            text-shadow: 0px 0px 10px rgba(0,0,0,0.8), 1px 1px 2px #000;
            transition: transform 0.1s;
        }

        .shake { animation: shakeAnim 0.3s infinite; }
        @keyframes shakeAnim {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-2px, 0px) rotate(-2deg); }
            40% { transform: translate(2px, 1px) rotate(2deg); }
            60% { transform: translate(-1px, -1px) rotate(-1deg); }
            80% { transform: translate(2px, -1px) rotate(1deg); }
            100% { transform: translate(1px, 1px) rotate(0deg); }
        }
        
        .notes-area { grid-column: 1 / -1; background: #000; border: 2px dashed var(--red); padding: 20px; margin-top: 25px; }

        #calc-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #111;
            border: 3px solid var(--red);
            padding: 20px;
            z-index: 1000;
            box-shadow: 10px 10px 0px #000;
        }
        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
        }
        .calc-btn {
            padding: 15px;
            font-size: 1rem;
            margin: 0;
            background: #222;
        }
    </style>
</head>
<body>

    <div class="header"><h1>Painel do Mestre Online</h1></div>

    <div id="step1" class="container">
        <h2>Configuração de Sessão</h2>
        <label>ESTILO DO RPG</label>
        <select id="rpg-style">
            <option value="jujutsu">Jujutsu Kaisen</option>
            <option value="medieval">Medieval</option>
            <option value="slasher">Slasher</option>
            <option value="faroeste">Faroeste</option>
            <option value="jojo">Jojo</option>
            <option value="paranormal">Paranormal</option>
            <option value="one piece">One Piece</option>
            <option value="casa amaldiçoada">Casa Amaldiçoada</option>
        </select>

        <label>ONE SHOT?</label>
        <select id="one-shot">
            <option value="Sim">Sim</option>
            <option value="Não">Não</option>
        </select>

        <label>DURAÇÃO DA CAMPANHA</label>
        <select id="duration"></select>

        <label>QUANTIDADE DE JOGADORES</label>
        <input type="number" id="p-count" value="2" min="1">

        <button onclick="proximoPasso()">Configurar Jogadores</button>
    </div>

    <div id="step2" class="container" style="display:none; max-width: 850px;">
        <h2>Fichas dos Personagens</h2>
        <div id="inputs-container"></div>
        <button onclick="confirmarFichas()">Finalizar e Abrir Painel</button>
    </div>

    <div id="rpg-panel">
        <div class="card">
            <h3>[STATUS DO GRUPO]</h3>
            <div id="final-hp-list"></div>
            <button onclick="reiniciarTudo()" style="font-size: 0.8rem; padding: 10px; background: #333;">REINICIAR TUDO</button>
        </div>

        <div class="card">
            <h3>[DADOS E FERRAMENTAS]</h3>
            
            <button onclick="toggleCalc()" style="background:#222; border:1px solid var(--red); margin-bottom:20px;">🧮 ABRIR CALCULADORA</button>

            <label>SELECIONAR DADO</label>
            <select id="dado-seletor" onchange="atualizarImagemDado()">
                <option value="2">D2</option>
                <option value="4">D4</option>
                <option value="6">D6</option>
                <option value="8">D8</option>
                <option value="9">D9</option>
                <option value="20" selected>D20</option>
            </select>
            <div id="dice-result" class="dice-box">--</div>
            <button onclick="jogarDado()">Rolar Dado</button>
            
            <div class="notes-area">
                <label style="margin:0">NOTAS DA AVENTURA</label>
                <textarea id="master-notes" rows="8" placeholder="Digite aqui o resumo da história..." oninput="salvarProgresso()"></textarea>
            </div>
        </div>
    </div>

    <div id="calc-popup">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
            <span style="color:var(--red); font-weight:bold">CALCULADORA</span>
            <button onclick="toggleCalc()" style="width:30px; padding:5px; margin:0; background:#444">X</button>
        </div>
        <input type="text" id="calc-display" readonly style="text-align:right; margin-bottom:10px; font-size:1.2rem">
        <div class="calc-grid">
            <button class="calc-btn" onclick="calcClear()">C</button>
            <button class="calc-btn" onclick="calcInput('/')">/</button>
            <button class="calc-btn" onclick="calcInput('*')">x</button>
            <button class="calc-btn" onclick="calcInput('-')">-</button>
            <button class="calc-btn" onclick="calcInput('7')">7</button>
            <button class="calc-btn" onclick="calcInput('8')">8</button>
            <button class="calc-btn" onclick="calcInput('9')">9</button>
            <button class="calc-btn" onclick="calcInput('+')">+</button>
            <button class="calc-btn" onclick="calcInput('4')">4</button>
            <button class="calc-btn" onclick="calcInput('5')">5</button>
            <button class="calc-btn" onclick="calcInput('6')">6</button>
            <button class="calc-btn" onclick="calcEqual()">=</button>
            <button class="calc-btn" onclick="calcInput('1')">1</button>
            <button class="calc-btn" onclick="calcInput('2')">2</button>
            <button class="calc-btn" onclick="calcInput('3')">3</button>
            <button class="calc-btn" onclick="calcInput('0')">0</button>
        </div>
    </div>

    <script>
        const durationSelect = document.getElementById('duration');
        for(let d=1; d<=30; d++) durationSelect.innerHTML += `<option value="${d} dias">${d} Dia(s)</option>`;
        for(let m=1; m<=5; m++) durationSelect.innerHTML += `<option value="${m} meses">${m} Mês(es)</option>`;

        let finalOrder = [];
        const classesData = {
            medieval: ["Viking", "Arqueiro", "Mago", "Guerreiro", "Ladino", "Paladino", "Bárbaro", "Bardo", "Druida", "Monge", "Feiticeiro", "Necromante", "Alquimista"],
            jujutsu: ["Feiticeiro", "Usuário de Maldição", "Maldição", "Restrição Celestial", "Xamã", "Invocador", "Mestre de Barreiras", "Grau Especial", "Grau 1", "Grau 2", "Grau 3", "Grau 4", "Corpo Amaldiçoado"],
            slasher: ["Médico", "Militar", "Estudante", "Policial", "Sobrevivente", "Cozinheiro", "Mecânico", "Zelador", "Atleta", "Nerd", "Popular", "Cético", "Repórter"],
            faroeste: ["Pistoleiro", "Xerife", "Bandoleiro", "Caçador de Recompensas", "Garimpeiro", "Cartas na Manga", "Médico de Fronteira", "Cavalariano", "Batedor", "Dono de Saloon", "Fugitivo", "Indígena Guerreiro", "Pregador"],
            jojo: ["Usuário Stand (Curto Alcance)", "Usuário Stand (Longo Alcance)", "Usuário Stand (Automático)", "Mestre Hamon", "Vampiro", "Homem do Pilar", "Ciborgue", "Usuário Stand (Fenômeno)", "Usuário Spin", "Usuário Stand (Colônia)", "Usuário Stand (Postura)", "Lutador", "Estrategista"],
            "casa amaldiçoada": ["Médium", "Investigador Paranormal", "Cético", "Escritor de Horror", "Herdeiro", "Ocultista", "Exorcista", "Criança Sensitiva", "Historiador", "Zelador Sinistro", "Cientista", "Sobrevivente", "Fotógrafo"],
            paranormal: ["Combatente", "Especialista", "Ocultista", "Infiltrado", "Atirador de Elite", "Graduado", "Flagelador", "Conduíte", "Lâmina Paranormal", "Médico de Campo", "Técnico", "Negociador", "Exorcista"],
            "one piece": ["Capitão", "Espadachim", "Navegador", "Atirador", "Cozinheiro", "Médico", "Arqueólogo", "Carpinteiro", "Músico", "Timoneiro", "Cientista", "Artesão", "Contramestre"]
        };

        function proximoPasso() {
            const qtd = parseInt(document.getElementById('p-count').value);
            const style = document.getElementById('rpg-style').value;
            const area = document.getElementById('inputs-container');
            area.innerHTML = '';
            const classes = classesData[style] || classesData.medieval;

            for(let i=0; i<qtd; i++) {
                let options = classes.map(c => `<option value="${c}">${c}</option>`).join('');
                area.innerHTML += `
                    <div class="player-card-input">
                        <div style="grid-column: span 2; color:var(--red); font-weight:bold; border-bottom: 1px solid #444; margin-bottom:5px">PLAYER ${i+1}</div>
                        <input type="text" placeholder="Nome do Personagem" class="in-nome" style="grid-column: span 2">
                        <select class="in-classe">${options}</select>
                        <input type="number" placeholder="HP Inicial (Vida)" class="in-hp" value="100">
                        <input type="text" placeholder="Idade" class="in-idade">
                        <input type="text" placeholder="Altura" class="in-altura">
                        <input type="text" placeholder="Peso" class="in-peso">
                        <input type="text" placeholder="${style==='jujutsu'?'Energia Amaldiçoada':'Poder Especial'}" class="in-extra">
                    </div>`;
            }
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
        }

        function confirmarFichas() {
            const cards = document.querySelectorAll('.player-card-input');
            finalOrder = [];
            cards.forEach((card) => {
                let hpVal = parseInt(card.querySelector('.in-hp').value) || 100;
                finalOrder.push({
                    nome: card.querySelector('.in-nome').value || "Herói",
                    classe: card.querySelector('.in-classe').value,
                    hp: hpVal,
                    maxHp: hpVal,
                    extra: card.querySelector('.in-extra').value || "Nenhum",
                    itens: ""
                });
            });
            document.getElementById('step2').style.display = 'none';
            document.getElementById('rpg-panel').style.display = 'grid';
            carregarPainel();
            salvarProgresso();
        }

        function carregarPainel() {
            const container = document.getElementById('final-hp-list');
            container.innerHTML = '';
            finalOrder.forEach((p, i) => {
                const pct = (p.hp / p.maxHp) * 100;
                container.innerHTML += `
                    <div style="border: 2px solid #444; padding: 15px; margin-bottom: 15px; background: #000">
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px">
                            <span style="color:var(--red)"><b>${p.nome.toUpperCase()}</b></span>
                            <span id="num-hp-${i}">${p.hp}/${p.maxHp}</span>
                        </div>
                        <div style="font-size:0.75rem; color:#aaa; margin-bottom:5px">${p.classe} | Info: ${p.extra}</div>
                        <div class="hp-bar-bg"><div id="bar-fill-${i}" class="hp-bar-fill" style="width:${pct}%"></div></div>
                        <div style="display:flex; gap:10px; margin-top:10px;">
                            <button onclick="mudarVida(${i}, -1)" style="flex:1; padding:8px; margin:0; font-size:0.9rem; background:#440000">-1 HP</button>
                            <button onclick="mudarVida(${i}, 1)" style="flex:1; padding:8px; margin:0; font-size:0.9rem; background:#1b4332">+1 HP</button>
                        </div>
                        <textarea id="itens-${i}" placeholder="Inventário e Itens..." oninput="salvarItens(${i})" style="margin-top:10px; height:70px; font-size:0.75rem; border-color:#333">${p.itens || ''}</textarea>
                    </div>`;
                mudarVida(i, 0); 
            });
        }

        function mudarVida(idx, valor) {
            let p = finalOrder[idx];
            p.hp = Math.max(0, Math.min(p.maxHp, p.hp + valor));
            const pct = (p.hp / p.maxHp) * 100;
            const fill = document.getElementById(`bar-fill-${idx}`);
            fill.style.width = pct + "%";
            document.getElementById(`num-hp-${idx}`).innerText = `${p.hp}/${p.maxHp}`;
            
            if(pct < 30) fill.style.background = "#d90429";
            else if(pct < 60) fill.style.background = "#ffb703";
            else fill.style.background = "#38b000";
            salvarProgresso();
        }

        function salvarItens(idx) {
            finalOrder[idx].itens = document.getElementById(`itens-${idx}`).value;
            salvarProgresso();
        }

        function atualizarImagemDado() {
            const lados = document.getElementById('dado-seletor').value;
            const resDisplay = document.getElementById('dice-result');
            
            if (lados === "9") {
                resDisplay.style.backgroundImage = "url('dado9.png')";
            } else if (lados === "2" || lados === "4") {
                // Tanto D2 quanto D4 usam a mesma imagem dado2.png
                resDisplay.style.backgroundImage = "url('dado4.png')";
            } else if (lados === "8" || lados === "6") {
                // Tanto D8 quanto D6 usam a mesma imagem dado8.png
                resDisplay.style.backgroundImage = "url('dado.png')";
            } else {
                // Imagem padrão para D20
                resDisplay.style.backgroundImage = "url('dado.png')";
            }
        }

        function jogarDado() {
            const lados = document.getElementById('dado-seletor').value;
            const resDisplay = document.getElementById('dice-result');
            resDisplay.innerText = "...";
            resDisplay.classList.add('shake');
            setTimeout(() => {
                const res = Math.floor(Math.random() * lados) + 1;
                resDisplay.classList.remove('shake');
                resDisplay.innerText = res;
            }, 500);
        }

        function toggleCalc() {
            const pop = document.getElementById('calc-popup');
            pop.style.display = (pop.style.display === 'block') ? 'none' : 'block';
        }
        function calcInput(v) { document.getElementById('calc-display').value += v; }
        function calcClear() { document.getElementById('calc-display').value = ''; }
        function calcEqual() {
            try {
                document.getElementById('calc-display').value = eval(document.getElementById('calc-display').value);
            } catch(e) {
                document.getElementById('calc-display').value = 'Erro';
            }
        }

        function salvarProgresso() {
            const dadosSessao = {
                finalOrder: finalOrder,
                notas: document.getElementById('master-notes').value,
                fase: document.getElementById('rpg-panel').style.display === 'grid' ? 'painel' : 'setup'
            };
            localStorage.setItem('rpg_save_data', JSON.stringify(dadosSessao));
        }

        function carregarProgresso() {
            const salvo = localStorage.getItem('rpg_save_data');
            if (salvo) {
                const dados = JSON.parse(salvo);
                if (dados.fase === 'painel') {
                    finalOrder = dados.finalOrder;
                    document.getElementById('step1').style.display = 'none';
                    document.getElementById('rpg-panel').style.display = 'grid';
                    document.getElementById('master-notes').value = dados.notas || '';
                    carregarPainel();
                }
            }
            atualizarImagemDado();
        }

        function reiniciarTudo() {
            if(confirm("Deseja apagar tudo e começar uma nova sessão?")) {
                localStorage.removeItem('rpg_save_data');
                location.reload();
            }
        }

        window.onload = carregarProgresso;
    </script>
</body>
</html>
