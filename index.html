<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RPG Master - PC & Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #d90429; --dark: #0b090a; --card: #161a1d; --white: #f5f3f4; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--dark); color: var(--white); 
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
        }
        
        .header { background: var(--red); width: 100%; padding: 20px 0; text-align: center; box-shadow: 0 4px 15px #000; z-index: 100; }
        .header h1 { margin: 0; font-family: 'Oswald'; text-transform: uppercase; letter-spacing: 1px; }

        .container { 
            width: 95%; max-width: 600px; background: var(--card); 
            padding: 25px; border-radius: 12px; border-top: 6px solid var(--red); 
            margin: 20px auto; box-shadow: 0 10px 30px #000; text-align: center; 
        }
        
        label { display: block; margin-top: 12px; font-weight: bold; color: var(--red); text-align: left; }
        
        select, input, button { 
            padding: 14px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; 
            font-size: 1rem; background: #0b090a; color: white; width: 100%; 
        }
        
        button { background: var(--red); border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        button:hover { background: #ef233c; transform: scale(1.02); }
        button:active { transform: scale(0.95); }

        /* AJUSTE PARA AS FICHAS */
        .player-row { 
            background: #252525; padding: 15px; border-radius: 8px; 
            margin-bottom: 12px; border-left: 5px solid var(--red); 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }

        /* PAINEL RESPONSIVO (O PULO DO GATO) */
        #rpg-panel { 
            display: none; width: 95%; max-width: 1100px; 
            margin: 20px auto; gap: 20px; 
        }

        /* No PC vira grade, no celular vira lista */
        @media (min-width: 768px) {
            #rpg-panel { grid-template-columns: 1.5fr 1fr; display: none; }
        }
        @media (max-width: 767px) {
            #rpg-panel { grid-template-columns: 1fr; display: none; }
            .player-row { grid-template-columns: 1fr; } /* No celular nome em cima, classe embaixo */
        }

        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #333; height: fit-content; }

        /* BARRINHA COM ÍCONE */
        .hp-unit { background: #111; padding: 12px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #222; }
        .hp-meta { display: flex; justify-content: space-between; font-family: 'MedievalSharp'; margin-bottom: 6px; }
        .hp-bar-wrapper { display: flex; align-items: center; gap: 10px; }
        .hp-heart { width: 24px; height: 24px; object-fit: contain; image-rendering: pixelated; }
        .hp-bar-bg { flex-grow: 1; height: 18px; background: #333; border: 1px solid #000; border-radius: 3px; overflow: hidden; position: relative; }
        .hp-bar-fill { height: 100%; background: #e63946; width: 100%; transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* DADO CENTRALIZADO */
        .dice-area { position: relative; width: 180px; height: 180px; margin: 20px auto; }
        .dice-img { width: 100%; height: 100%; object-fit: contain; }
        .dice-val { 
            position: absolute; top: 52%; left: 50%; 
            transform: translate(-50%, -50%); font-size: 3rem; 
            font-family: 'MedievalSharp'; font-weight: bold; 
            text-shadow: 2px 2px 5px #000; color: white;
        }
        
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% {transform: rotate(0);} 25% {transform: rotate(5deg) scale(1.1);} 75% {transform: rotate(-5deg) scale(1.1);} }
    </style>
</head>
<body>

    <div class="header"><h1>Mestre Multiplataforma</h1></div>

    <div id="step1" class="container">
        <h2>Sessão</h2>
        <label>Tema</label>
        <select id="rpg-style">
            <option value="jujutsu">Jujutsu Kaisen</option>
            <option value="medieval">Medieval Clássico</option>
            <option value="roça">Aventuras na Roça</option>
        </select>
        <label>Duração</label>
        <select id="duration">
            <option value="1 dia">1 Dia</option>
            <option value="5 meses">5 Meses</option>
        </select>
        <label>Jogadores</label>
        <input type="number" id="p-count" value="3" min="1">
        <label>Vida Inicial</label>
        <input type="number" id="p-hp-base" value="100">
        <button onclick="proximo()">Configurar Grupo</button>
    </div>

    <div id="step2" class="container" style="display:none;">
        <div id="inputs-area"></div>
        <button onclick="confirmar()">Confirmar Heróis</button>
        <div id="sorteio-area" style="display:none; margin-top:20px;">
            <div id="res-sorteio" style="color: gold; font-size: 1.2rem; margin-bottom: 15px;">Aguardando Sorteio...</div>
            <button id="btn-rodar" onclick="girar()">Sortear Ordem</button>
        </div>
    </div>

    <div id="rpg-panel">
        <div class="card">
            <h3>👥 Grupo de Aventura</h3>
            <div id="painel-hp"></div>
        </div>

        <div class="card">
            <h3>🎲 O Dado de Destino</h3>
            <div class="dice-area" id="dice-anchor">
                <img src="dado.png" class="dice-img">
                <div id="dice-result" class="dice-val">--</div>
            </div>
            <button onclick="jogar()" style="padding: 20px; font-size: 1.2rem;">LANÇAR DADO</button>
        </div>
    </div>

    <script>
        let pList = []; let draft = []; let order = []; let base = 100;

        function proximo() {
            const n = parseInt(document.getElementById('p-count').value);
            base = parseInt(document.getElementById('p-hp-base').value) || 100;
            const area = document.getElementById('inputs-area');
            area.innerHTML = '<h2>Fichas</h2>';
            for(let i=0; i<n; i++) {
                area.innerHTML += `<div class="player-row">
                    <input type="text" placeholder="Nome" class="in-n">
                    <select class="in-c"><option>Guerreiro</option><option>Feiticeiro</option><option>Mestre de Maldição</option></select>
                </div>`;
            }
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
        }

        function confirmar() {
            const nomes = document.querySelectorAll('.in-n');
            const classes = document.querySelectorAll('.in-c');
            pList = [];
            nomes.forEach((n, i) => pList.push({ nome: n.value || `Player ${i+1}`, classe: classes[i].value, hp: base }));
            draft = [...pList];
            document.getElementById('sorteio-area').style.display = 'block';
        }

        function girar() {
            if(draft.length === 0) return;
            const idx = Math.floor(Math.random() * draft.length);
            const p = draft.splice(idx, 1)[0];
            order.push(p);
            document.getElementById('res-sorteio').innerText = "Sorteado: " + p.nome;
            if(draft.length === 0) {
                const b = document.getElementById('btn-rodar');
                b.innerText = "ENTRAR NO JOGO"; b.style.background = "#38b000";
                b.onclick = () => {
                    document.getElementById('step2').style.display = 'none';
                    const panel = document.getElementById('rpg-panel');
                    panel.style.display = window.innerWidth >= 768 ? 'grid' : 'flex';
                    render();
                };
            }
        }

        function render() {
            const area = document.getElementById('painel-hp');
            area.innerHTML = '';
            order.forEach((p, i) => {
                area.innerHTML += `<div class="hp-unit">
                    <div class="hp-meta"><span>${p.nome} (${p.classe})</span><span id="txt-${i}">${p.hp}/${base}</span></div>
                    <div class="hp-bar-wrapper">
                        <img src="as.jpg" class="hp-heart">
                        <div class="hp-bar-bg"><div id="bar-${i}" class="hp-bar-fill"></div></div>
                    </div>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <button onclick="u(${i},-10)" style="flex:1; background:#660708;">-10</button>
                        <button onclick="u(${i},10)" style="flex:1; background:#38b000;">+10</button>
                    </div>
                </div>`;
            });
        }

        function u(i, v) {
            order[i].hp = Math.max(0, Math.min(base, order[i].hp + v));
            const p = (order[i].hp / base) * 100;
            document.getElementById(`bar-${i}`).style.width = p + "%";
            document.getElementById(`txt-${i}`).innerText = `${order[i].hp}/${base}`;
        }

        function jogar() {
            const a = document.getElementById('dice-anchor');
            a.classList.add('shake');
            setTimeout(() => {
                document.getElementById('dice-result').innerText = Math.floor(Math.random()*20)+1;
                a.classList.remove('shake');
            }, 400);
        }
    </script>
</body>
</html>
